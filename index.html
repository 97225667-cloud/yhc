<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YHC GOURMET | 全球美食收藏</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">
    <style>
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .food-card { animation: fadeInUp 0.5s ease forwards; opacity: 0; }
        .logo-font { font-family: 'Permanent Marker', cursive; background: linear-gradient(135deg, #f97316 0%, #ef4444 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        #modal-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(10px); display: none; z-index: 100; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-stone-50 text-stone-800">

    <nav class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-md border-b border-stone-100">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-orange-500 rounded-xl flex items-center justify-center rotate-3 shadow-lg"><span class="text-white text-2xl">🔥</span></div>
                <h1 class="logo-font text-2xl font-black">YHC GOURMET</h1>
            </div>
            <button class="bg-red-50 text-red-500 px-5 py-2 rounded-full font-bold text-sm flex items-center gap-2 border border-red-100 hover:bg-red-100 transition">
                ❤️ 收藏
            </button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 pt-32 pb-20">
        <header class="mb-12">
            <h2 class="text-4xl font-black mb-8 italic">今日份的<span class="text-orange-500 underline decoration-stone-200">味觉清单</span></h2>
            <div class="flex flex-wrap gap-3 items-center">
                <button onclick="filterFood('all')" class="px-6 py-2 bg-stone-900 text-white rounded-full text-sm font-bold shadow-md">全部</button>
                <button onclick="filterFood('Sichuan')" class="px-6 py-2 bg-white border border-stone-200 rounded-full text-sm font-bold hover:bg-stone-50">川味</button>
                <button onclick="filterFood('Cantonese')" class="px-6 py-2 bg-white border border-stone-200 rounded-full text-sm font-bold hover:bg-stone-50">粤式</button>
                <button onclick="filterFood('Home')" class="px-6 py-2 bg-white border border-stone-200 rounded-full text-sm font-bold hover:bg-stone-50">家常</button>
                <button onclick="filterFood('Global')" class="px-6 py-2 bg-white border border-stone-200 rounded-full text-sm font-bold hover:bg-stone-50">异国风味</button>
                <button onclick="pickRandomFood()" class="px-6 py-2 bg-orange-500 text-white rounded-full text-sm font-bold flex items-center gap-2 shadow-lg shadow-orange-200">🎲 随机决定</button>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8" id="foodGrid">
            </div>
    </main>

    <div id="modal-overlay" onclick="closeModal()" class="flex items-center justify-center p-4">
        <div id="modal-content" class="bg-white rounded-[2rem] max-w-md w-full max-h-[80vh] overflow-hidden flex flex-col shadow-2xl transition-all scale-95" onclick="event.stopPropagation()">
            <div class="h-48 shrink-0 relative">
                <img id="modal-img" src="" class="w-full h-full object-cover">
            </div>
            <div class="p-8 overflow-y-auto no-scrollbar">
                <h2 id="modal-title" class="text-2xl font-black mb-4"></h2>
                <div class="space-y-4">
                    <p class="text-orange-600 font-bold text-sm">👨‍🍳 烹饪秘籍</p>
                    <p id="modal-steps" class="text-stone-600 text-sm leading-relaxed"></p>
                    <div class="p-4 bg-orange-50 border-l-4 border-orange-500 rounded-r-xl">
                        <p id="modal-tip" class="text-orange-900 text-xs italic"></p>
                    </div>
                </div>
                <button onclick="closeModal()" class="w-full mt-6 py-3 bg-stone-900 text-white rounded-xl font-bold">了解</button>
            </div>
        </div>
    </div>

    <script>
        const recipes = [
            // 川味 (Sichuan)
            { name: "麻婆豆腐", cat: "Sichuan", desc: "麻辣鲜香", steps: "1.豆腐焯水；2.炒豆瓣酱肉末；3.勾芡收汁。", tip: "花椒粉一定要最后撒。", img: "https://images.unsplash.com/photo-1591814447921-7fa7a2f6d55d?w=400" },
            { name: "宫保鸡丁", cat: "Sichuan", desc: "酸甜微辣", steps: "1.鸡丁腌制；2.炸香辣椒；3.合炒加入花生。", tip: "花生米最后放，保持酥脆。", img: "https://images.unsplash.com/photo-1525755662778-989d0524087e?w=400" },
            { name: "水煮牛肉", cat: "Sichuan", desc: "麻辣劲爽", steps: "1.牛肉切片浆好；2.热汤煮熟；3.泼热油。", tip: "油温要高，激发出椒香。", img: "https://images.unsplash.com/photo-1541518763669-27fef04b14ea?w=400" },
            { name: "回锅肉", cat: "Sichuan", desc: "肥而不腻", steps: "1.猪肉煮熟切片；2.炒至灯盏窝；3.下蒜苗。", tip: "郫县豆瓣酱是核心。", img: "https://images.unsplash.com/photo-1623341214825-9f4f963727da?w=400" },
            
            // 粤式 (Cantonese)
            { name: "广式蒸鱼", cat: "Cantonese", desc: "清淡鲜美", steps: "1.鱼上锅蒸8分钟；2.倒掉鱼水；3.淋油和豉油。", tip: "火要猛，鱼肉才嫩。", img: "https://images.unsplash.com/photo-1519708227418-c8fd9a32b7a2?w=400" },
            { name: "干炒牛河", cat: "Cantonese", desc: "锅气十足", steps: "1.炒嫩牛肉；2.河粉弄散快炒；3.老抽调色。", tip: "讲究‘镬气’，手速要快。", img: "https://images.unsplash.com/photo-1512058564366-18510be2db19?w=400" },
            { name: "白斩鸡", cat: "Cantonese", desc: "原汁原味", steps: "1.三提三放浸熟；2.过冰水；3.配姜葱油。", tip: "冰水浸泡使皮更Q弹。", img: "https://images.unsplash.com/photo-1598515214211-89d3c73ae83b?w=400" },
            { name: "咕噜肉", cat: "Cantonese", desc: "酸甜开胃", steps: "1.肉块炸酥；2.炒糖醋汁；3.加入菠萝快拌。", tip: "汁水均匀裹在肉上即可。", img: "https://images.unsplash.com/photo-1525755662778-989d0524087e?w=400" },

            // 家常 (Home)
            { name: "红烧肉", cat: "Home", desc: "经典浓郁", steps: "1.五花肉炒糖色；2.加香料小火炖；3.大火收汁。", tip: "炖煮时间不能少于一小时。", img: "https://images.unsplash.com/photo-1627308595229-7830a5c91f9f?w=400" },
            { name: "番茄炒蛋", cat: "Home", desc: "快手拌饭", steps: "1.炒好蛋盛出；2.番茄炒出汁；3.回锅混合。", tip: "多加一点糖更鲜美。", img: "https://images.unsplash.com/photo-1582450871972-ab5ca641643d?w=400" },
            { name: "地三鲜", cat: "Home", desc: "素菜极品", steps: "1.油炸土豆茄子；2.合炒青椒；3.勾芡调味。", tip: "茄子炸透才好吃。", img: "https://images.unsplash.com/photo-1512621776951-a57141f2eefd?w=400" },
            { name: "糖醋排骨", cat: "Home", desc: "酸甜适度", steps: "1.排骨炸干；2.调糖醋汁；3.慢火焖收。", tip: "最后放一点陈醋提香。", img: "https://images.unsplash.com/photo-1544148103-0773bf10d330?w=400" },
            { name: "土豆丝", cat: "Home", desc: "酸脆爽口", steps: "1.切丝去淀粉；2.快火翻炒；3.加醋出锅。", tip: "大火快炒是脆的关键。", img: "https://images.unsplash.com/photo-1585109649139-366815a0d713?w=400" },

            // 异国风味 (Global)
            { name: "日式拉面", cat: "Global", desc: "醇厚骨汤", steps: "1.熬制猪骨汤；2.煮碱水面；3.配叉烧溏心蛋。", tip: "汤底是拉面的灵魂。", img: "https://images.unsplash.com/photo-1526318896980-cf78c088247c?w=400" },
            { name: "泰式冬阴功", cat: "Global", desc: "酸辣鲜灵", steps: "1.煮香茅底汤；2.加入大虾和蘑菇；3.加椰奶。", tip: "柠檬叶和南姜必不可少。", img: "https://images.unsplash.com/photo-1548943487-a2e4143eb544?w=400" },
            { name: "意大利面", cat: "Global", desc: "经典番茄肉酱", steps: "1.煮面留白芯；2.熬肉酱；3.拌匀撒奶酪。", tip: "意面水里加点盐。", img: "https://images.unsplash.com/photo-1551183053-bf91a1d81141?w=400" },
            { name: "法式牛排", cat: "Global", desc: "外焦内嫩", steps: "1.牛排吸干水；2.大火双面煎；3.加黄油迷迭香。", tip: "煎好后记得‘醒’肉5分钟。", img: "https://images.unsplash.com/photo-1546241072-48010ad28c2c?w=400" },
            { name: "韩式拌饭", cat: "Global", desc: "五彩斑斓", steps: "1.准备各色菜丝；2.拌好辣酱；3.码在石锅饭上。", tip: "石锅烧热才有锅巴。", img: "https://images.unsplash.com/photo-1590301157890-4810ed352733?w=400" },
            { name: "墨西哥塔可", cat: "Global", desc: "风味独特", steps: "1.烤玉米饼；2.填肉酱和莎莎酱；3.挤柠檬汁。", tip: "一定要加牛油果酱。", img: "https://images.unsplash.com/photo-1565299585323-38d6b0865b47?w=400" },
            { name: "天妇罗", cat: "Global", desc: "轻盈松脆", steps: "1.调制冰水面糊；2.裹虾和蔬菜；3.快速油炸。", tip: "面糊不要过度搅拌。", img: "https://images.unsplash.com/photo-1615361413105-8825f7712a61?w=400" }
        ];

        const grid = document.getElementById('foodGrid');
        function render(data) {
            grid.innerHTML = data.map((r, i) => `
                <div class="food-item ${r.cat} food-card bg-white rounded-[2rem] overflow-hidden shadow-sm border border-stone-100 hover:shadow-xl transition-all" style="animation-delay:${i*0.05}s">
                    <div class="h-48 cursor-pointer relative" onclick="showDetail('${r.name}', '${r.img}', '${r.steps}', '${r.tip}')">
                        <img src="${r.img}" class="w-full h-full object-cover">
                        <div class="absolute top-3 left-3 bg-white/90 backdrop-blur-md px-2 py-1 rounded-md text-[10px] font-black uppercase tracking-widest text-orange-600">${r.cat}</div>
                    </div>
                    <div class="p-6">
                        <h3 class="font-black text-lg mb-1">${r.name}</h3>
                        <p class="text-stone-400 text-xs mb-4">${r.desc}</p>
                        <button onclick="toggleFav(event)" class="w-full py-2 bg-stone-50 rounded-xl text-stone-400 text-xs font-bold hover:text-red-500 hover:bg-red-50 transition-all">❤ 收藏</button>
                    </div>
                </div>
            `).join('');
        }

        render(recipes);

        function showDetail(n, i, s, t) {
            document.getElementById('modal-title').innerText = n;
            document.getElementById('modal-img').src = i;
            document.getElementById('modal-steps').innerText = s;
            document.getElementById('modal-tip').innerText = t;
            document.getElementById('modal-overlay').style.display = 'flex';
            setTimeout(() => document.getElementById('modal-content').classList.replace('scale-95', 'scale-100'), 10);
        }

        function closeModal() {
            document.getElementById('modal-content').classList.replace('scale-100', 'scale-95');
            setTimeout(() => document.getElementById('modal-overlay').style.display = 'none', 200);
        }

        function filterFood(cat) {
            const filtered = cat === 'all' ? recipes : recipes.filter(r => r.cat === cat);
            render(filtered);
        }

        function pickRandomFood() {
            const r = recipes[Math.floor(Math.random() * recipes.length)];
            showDetail(r.name, r.img, r.steps, r.tip);
        }

        function toggleFav(e) {
            const b = e.currentTarget;
            b.classList.toggle('text-red-500');
            b.classList.toggle('bg-red-50');
            b.innerText = b.classList.contains('text-red-500') ? '❤️ 已收藏' : '❤ 收藏';
        }
    </script>
</body>
</html>
