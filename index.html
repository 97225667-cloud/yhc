<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YHC GOURMET | 江西赣味</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    <style>
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .food-card { animation: fadeInUp 0.6s ease forwards; opacity: 0; border-radius: 2.5rem !important; }
        .shanshui-font { font-family: 'Ma Shan Zheng', cursive; }
        #modal-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(12px); display: none; z-index: 100; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        html { scroll-behavior: smooth; }
        .hero-gradient { background: linear-gradient(to bottom, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.8) 100%); }
    </style>
</head>
<body class="bg-stone-50 text-stone-800 flex flex-col min-h-screen">

    <nav class="fixed top-0 w-full z-50 bg-white/90 backdrop-blur-md border-b border-stone-100">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between gap-4">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-orange-500 rounded-lg flex items-center justify-center rotate-3 shadow-lg">
                    <span class="text-white text-xl font-bold">Y</span>
                </div>
                <h1 class="text-xl font-black text-stone-700">HC GOURMET</h1>
            </div>
            <div class="flex-grow max-w-md hidden md:block">
                <div class="flex items-center bg-stone-100 rounded-full px-4 py-2 border border-stone-200">
                    <input type="text" id="searchInput" onkeyup="searchFood()" placeholder="搜寻江西特色美食..." 
                           class="bg-transparent border-none outline-none w-full text-sm text-stone-600">
                </div>
            </div>
            <button class="bg-red-50 text-red-500 px-5 py-2 rounded-full font-bold text-sm">❤️ 收藏</button>
        </div>
    </nav>

    <section class="relative h-[70vh] w-full overflow-hidden flex items-center justify-center text-center">
        <img src="https://images.unsplash.com/photo-1555939594-58d7cb561ad1?q=80&w=2000" class="absolute inset-0 w-full h-full object-cover">
        <div class="absolute inset-0 hero-gradient"></div>
        <div class="relative z-10 px-6">
            <h2 class="shanshui-font text-6xl md:text-8xl text-white mb-6 drop-shadow-2xl">江西烟火气，赣菜最辣心</h2>
            <p class="text-white/80 text-xl md:text-2xl mb-10 tracking-widest font-light">寻味江西 · 私人定制的美食清单</p>
            <a href="#menu-start" class="inline-block px-10 py-4 bg-orange-500 text-white rounded-full text-xl font-bold shadow-2xl hover:bg-orange-600 transition">开启味觉之旅</a>
        </div>
    </section>

    <main id="menu-start" class="max-w-7xl mx-auto px-6 pt-20 pb-20 flex-grow">
        <header class="mb-12">
            <h3 class="text-4xl font-black italic mb-6 italic">今日 <span class="text-orange-500">清单</span></h3>
            <div class="flex flex-wrap items-center justify-between gap-4">
                <div class="flex flex-wrap gap-2">
                    <button onclick="filterFood('all')" class="px-6 py-2 bg-stone-900 text-white rounded-full text-sm font-bold shadow-md">全部</button>
                    <button onclick="filterFood('Nanchang')" class="px-6 py-2 bg-white border border-stone-200 rounded-full text-sm font-bold hover:bg-stone-100">南昌风味</button>
                    <button onclick="filterFood('Ganzhou')" class="px-6 py-2 bg-white border border-stone-200 rounded-full text-sm font-bold hover:bg-stone-100">赣南客家</button>
                    <button onclick="filterFood('Jiujiang')" class="px-6 py-2 bg-white border border-stone-200 rounded-full text-sm font-bold hover:bg-stone-100">九江鲜味</button>
                    <button onclick="filterFood('Special')" class="px-6 py-2 bg-white border border-stone-200 rounded-full text-sm font-bold hover:bg-stone-100">各地特产</button>
                </div>
                <button onclick="pickRandomFood()" class="px-6 py-3 bg-orange-100 text-orange-600 rounded-2xl font-black flex items-center gap-2">🎲 帮我决定</button>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-10" id="foodGrid"></div>
    </main>

    <footer class="bg-[#141414] text-white py-12">
        <div class="max-w-7xl mx-auto px-6 text-center">
            <div class="flex items-center justify-center gap-2 mb-4">
                <span class="text-orange-500 text-2xl font-bold">Y</span>
                <span class="text-xl font-bold tracking-[0.2em]">HC GOURMET</span>
            </div>
            <p class="text-stone-500 text-xs tracking-widest font-light">© 2026 YHC 私人美食收藏馆 · 热烈而自由</p>
        </div>
    </footer>

    <div id="modal-overlay" onclick="closeModal()" class="flex items-center justify-center p-4">
        <div id="modal-content" class="bg-white rounded-[3.5rem] max-w-md w-full max-h-[85vh] overflow-hidden flex flex-col shadow-2xl transition-all scale-95" onclick="event.stopPropagation()">
            <div class="h-60 shrink-0 relative">
                <img id="modal-img" src="" class="w-full h-full object-cover">
                <button onclick="closeModal()" class="absolute top-6 right-6 bg-black/20 backdrop-blur-md text-white w-10 h-10 rounded-full flex items-center justify-center">✕</button>
            </div>
            <div class="p-10 overflow-y-auto no-scrollbar">
                <h2 id="modal-title" class="text-3xl font-black mb-2"></h2>
                <div class="w-12 h-1 bg-orange-500 mb-8 rounded-full"></div>
                <div class="space-y-6">
                    <p class="text-stone-800 font-bold flex items-center gap-2 text-lg">👩‍🍳 赣味秘籍：</p>
                    <p id="modal-steps" class="text-stone-600 leading-loose text-base whitespace-pre-line"></p>
                    <div class="p-6 bg-orange-50 border-l-8 border-orange-500 rounded-r-3xl">
                        <p id="modal-tip" class="text-orange-900 italic font-medium"></p>
                    </div>
                </div>
                <button onclick="closeModal()" class="w-full mt-10 py-4 bg-stone-900 text-white rounded-2xl font-bold">学会了，开吃！</button>
            </div>
        </div>
    </div>

    <script>
        const recipes = [
            { name: "宁都三杯鸡", cat: "Ganzhou", desc: "赣菜之首，三杯定江山", steps: "1. 鸡肉剁块焯水。\n2. 米酒、酱油、猪油各一小杯。\n3. 砂锅文火焖至收汁。", tip: "不放一滴水，全是米酒香。", img: "https://images.unsplash.com/photo-1604908176997-125f25cc6f3d?q=80&w=600" },
            { name: "南昌拌粉", cat: "Nanchang", desc: "南昌人的早起动力", steps: "1. 米粉煮熟过冷水。\n2. 加入辣酱、花生、萝卜干。\n3. 猛力拌匀，配一碗瓦罐汤。", tip: "秘制辣椒油多放点才够爽。", img: "https://images.unsplash.com/photo-1512621776951-a57141f2eefd?q=80&w=600" },
            { name: "藜蒿炒腊肉", cat: "Special", desc: "鄱阳湖的味道，脆嫩鲜辣", steps: "1. 藜蒿去叶切段。\n2. 腊肉切片煸出猪油。\n3. 大火快炒，加入干辣椒。", tip: "藜蒿要快炒，老了就不好吃了。", img: "https://images.unsplash.com/photo-1547928576-a4a33237ce35?q=80&w=600" },
            { name: "井冈烟笋", cat: "Special", desc: "革命老区的山珍美味", steps: "1. 烟笋泡发切丝。\n2. 配腊肉丝、干红椒炒制。\n3. 焖煮入味，收干汤汁。", tip: "烟熏味是这道菜的灵魂。", img: "https://images.unsplash.com/photo-1585109649139-366815a0d713?q=80&w=600" },
            { name: "萍乡炒血鸭", cat: "Special", desc: "辣到怀疑人生，却停不下来", steps: "1. 鸭肉砍碎爆炒。\n2. 铺天盖地的鲜辣椒块。\n3. 出锅前淋入鸭血快炒上色。", tip: "血鸭颜色要深，辣椒要多！", img: "https://images.unsplash.com/photo-1526318896980-cf78c088247c?q=80&w=600" },
            { name: "余干辣椒炒肉", cat: "Special", desc: "最强下饭菜，辣椒比肉贵", steps: "1. 余干枫树辣洗净。\n2. 猪肉片煸香。\n3. 辣椒拍扁合炒入味。", tip: "辣椒皮薄肉厚，不用加水。", img: "https://images.unsplash.com/photo-1565299507177-b0ac0f2ec411?q=80&w=600" },
            { name: "南昌瓦罐汤", cat: "Nanchang", desc: "慢火煨制，鲜香入骨", steps: "1. 食材放入小瓦罐。\n2. 大缸套小罐，煨足7小时。\n3. 只加盐，保持原汁原味。", tip: "肉饼汤和鸡蛋肉饼是最经典的。", img: "https://images.unsplash.com/photo-1547592166-23ac45744a05?q=80&w=600" },
            { name: "九江鱼块", cat: "Jiujiang", desc: "庐山下的鲜嫩口感", steps: "1. 草鱼切大块腌制炸金黄。\n2. 姜蒜辣酱爆香，入鱼块。\n3. 小火收汁，撒大把蒜苗。", tip: "外酥里嫩，汁水要粘稠。", img: "https://images.unsplash.com/photo-1519708227418-c8fd9a32b7a2?q=80&w=600" },
            { name: "鄱阳湖狮子头", cat: "Jiujiang", desc: "个大如斗，酥香味浓", steps: "1. 肉糜加荸荠、硬米。\n2. 捏成球状入锅油炸。\n3. 入高汤慢炖入味。", tip: "里面加了茨菇，口感更有层次。", img: "https://images.unsplash.com/photo-1529006557810-274b9b2fc783?q=80&w=600" },
            { name: "赣州小炒鱼", cat: "Ganzhou", desc: "王阳明爱吃的酸辣美味", steps: "1. 鲜鱼切块油炸。\n2. 姜丝、蒜末、醋勾芡。\n3. 快速翻炒收汁。", tip: "关键在于那一口醋的酸爽。", img: "https://images.unsplash.com/photo-1544148103-0773bf10d330?q=80&w=600" },
            { name: "兴国米粉鱼", cat: "Ganzhou", desc: "红军菜，软糯鲜香", steps: "1. 鱼块抹盐和米粉混合。\n2. 铺在蒸笼里大火蒸熟。\n3. 淋上秘制红油和葱花。", tip: "粉要粘在鱼肉上才够格。", img: "https://images.unsplash.com/photo-1512058564366-18510be2db19?q=80&w=600" },
            { name: "庐山石鸡", cat: "Jiujiang", desc: "庐山三宝之一，极品野味", steps: "1. 石鸡（蛙类）去皮洗净。\n2. 加姜、辣椒红焖。\n3. 勾芡装盘，肉质极嫩。", tip: "现在多用牛蛙代替，味道一样鲜。", img: "https://images.unsplash.com/photo-1615361413105-8825f7712a61?q=80&w=600" },
            { name: "临川牛杂", cat: "Special", desc: "抚州名片，辣到通透", steps: "1. 牛杂洗净炖烂。\n2. 海量朝天椒、鲜红椒爆香。\n3. 猛火快炒，辣汁浓郁。", tip: "辣是灵魂，不辣不临川。", img: "https://images.unsplash.com/photo-1541518763669-27fef04b14ea?q=80&w=600" },
            { name: "文山鸡丁", cat: "Special", desc: "吉安名肴，酸甜适口", steps: "1. 鸡丁浆好过油。\n2. 配黄瓜、辣椒、木耳。\n3. 快速炒匀，色泽清亮。", tip: "江西菜中少见的不辣硬菜。", img: "https://images.unsplash.com/photo-1525755662778-989d0524087e?q=80&w=600" },
            { name: "丰城冻米糖", cat: "Special", desc: "江西人的新年记忆", steps: "1. 糯米蒸熟冻干再炸。\n2. 糖浆熬制拉丝。\n3. 趁热压实切片。", tip: "脆、甜、香，家里的味道。", img: "https://images.unsplash.com/photo-1582211594533-268f4f1edeb9?q=80&w=600" },
            { name: "弋阳年糕", cat: "Special", desc: "久煮不糊，韧性十足", steps: "1. 年糕切片。\n2. 配白糖干炒或配咸肉炒。\n3. 韧劲大，回味甜。", tip: "弋阳大米做的才正宗。", img: "https://images.unsplash.com/photo-1590301157890-4810ed352733?q=80&w=600" },
            { name: "瑞金牛肉汤", cat: "Ganzhou", desc: "赣南早餐的极致诱惑", steps: "1. 鲜牛肉切薄片拌粉。\n2. 入沸汤中烫熟。\n3. 加大量生姜末、胡椒粉。", tip: "姜味越重越好喝。", img: "https://images.unsplash.com/photo-1548943487-a2e4143eb544?q=80&w=600" },
            { name: "泰和乌鸡汤", cat: "Special", desc: "养生圣品，黑皮黑骨", steps: "1. 乌鸡切块入砂锅。\n2. 加入当归、枸杞慢炖。\n3. 汤清肉烂，营养丰富。", tip: "不用太多调料，原汁原味最好。", img: "https://images.unsplash.com/photo-1547592166-23ac45744a05?q=80&w=600" },
            { name: "景德镇碱水粑", cat: "Special", desc: "瓷都烟火，风味独特", steps: "1. 碱水粑切薄片。\n2. 配腊肉丝、鸡蛋翻炒。\n3. 加入干辣椒和葱花。", tip: "口感软糯，有一股碱香味。", img: "https://images.unsplash.com/photo-1563245339-dfc201aa6829?q=80&w=600" },
            { name: "万安鱼焙", cat: "Special", desc: "小鱼干里的赣味精华", steps: "1. 万安湖小鱼熏干。\n2. 加辣椒、生姜红焖。\n3. 极其下饭，又鲜又辣。", tip: "配上一碗大米饭，绝了！", img: "https://images.unsplash.com/photo-1585109649139-366815a0d713?q=80&w=600" }
        ];

        const grid = document.getElementById('foodGrid');
        function render(data) {
            grid.innerHTML = data.map((r, i) => `
                <div class="food-card bg-white overflow-hidden shadow-sm border border-stone-100 hover:shadow-2xl transition-all" style="animation-delay:${i*0.05}s">
                    <div class="h-60 cursor-pointer relative group" onclick="showDetail('${r.name}', '${r.img}', '${r.steps.replace(/\n/g, "<br>")}', '${r.tip}')">
                        <img src="${r.img}" class="w-full h-full object-cover group-hover:scale-105 transition duration-700">
                        <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                            <span class="text-white font-bold border-2 border-white px-5 py-2 rounded-full backdrop-blur-sm">查看食谱</span>
                        </div>
                    </div>
                    <div class="p-8">
                        <h3 class="font-black text-2xl mb-2">${r.name}</h3>
                        <p class="text-stone-400 text-sm mb-6 tracking-wide">${r.desc}</p>
                        <button onclick="toggleFav(event)" class="w-full py-4 bg-stone-50 rounded-2xl text-stone-500 text-xs font-bold hover:text-red-500 hover:bg-red-50 transition-all flex items-center justify-center gap-2">❤ 收藏赣味</button>
                    </div>
                </div>
            `).join('');
        }

        function searchFood() { render(recipes.filter(r => r.name.includes(document.getElementById('searchInput').value))); }
        function filterFood(cat) { render(cat === 'all' ? recipes : recipes.filter(r => r.cat === cat)); }
        function showDetail(n, i, s, t) {
            document.getElementById('modal-title').innerText = n;
            document.getElementById('modal-img').src = i;
            document.getElementById('modal-steps').innerHTML = s;
            document.getElementById('modal-tip').innerText = t;
            document.getElementById('modal-overlay').style.display = 'flex';
            setTimeout(() => document.getElementById('modal-content').classList.replace('scale-95', 'scale-100'), 10);
        }
        function closeModal() {
            document.getElementById('modal-content').classList.replace('scale-100', 'scale-95');
            setTimeout(() => document.getElementById('modal-overlay').style.display = 'none', 200);
        }
        function toggleFav(e) {
            const b = e.currentTarget;
            b.classList.toggle('text-red-500');
            b.innerHTML = b.classList.contains('text-red-500') ? '❤️ 已收藏' : '❤ 收藏赣味';
        }
        function pickRandomFood() {
            const r = recipes[Math.floor(Math.random() * recipes.length)];
            showDetail(r.name, r.img, r.steps.replace(/\n/g, "<br>"), r.tip);
        }
        render(recipes);
    </script>
</body>
</html>
