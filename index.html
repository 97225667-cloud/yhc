<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YHC GOURMET | 江西赣味全量收藏馆</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    <style>
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .food-card { animation: fadeInUp 0.6s ease forwards; opacity: 0; border-radius: 2.5rem !important; }
        .shanshui-font { font-family: 'Ma Shan Zheng', cursive; }
        #modal-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(12px); display: none; z-index: 100; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        html { scroll-behavior: smooth; }
        .hero-gradient { background: linear-gradient(to bottom, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.8) 100%); }
        .chili-red { color: #e11d48; }
    </style>
</head>
<body class="bg-stone-50 text-stone-800 flex flex-col min-h-screen">

    <nav class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-md border-b border-stone-100">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between gap-4">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-orange-600 rounded-lg flex items-center justify-center rotate-3 shadow-lg">
                    <span class="text-white text-xl font-bold">Y</span>
                </div>
                <h1 class="text-xl font-black text-stone-700 tracking-tight">HC GOURMET</h1>
            </div>
            <div class="flex-grow max-w-md hidden md:block">
                <div class="flex items-center bg-stone-100 rounded-full px-5 py-2 border border-stone-200">
                    <input type="text" id="searchInput" onkeyup="searchFood()" placeholder="搜寻江西特色美食..." class="bg-transparent border-none outline-none w-full text-sm text-stone-600">
                </div>
            </div>
            <div class="flex gap-4">
                <button onclick="pickRandomFood()" class="hidden sm:flex items-center gap-2 text-sm font-bold text-orange-600 bg-orange-50 px-4 py-2 rounded-full">🎲 随机选菜</button>
            </div>
        </div>
    </nav>

    <section class="relative h-[65vh] w-full overflow-hidden flex items-center justify-center text-center">
        <img src="https://images.unsplash.com/photo-1547592166-23ac45744a05?q=80&w=2000" class="absolute inset-0 w-full h-full object-cover">
        <div class="absolute inset-0 hero-gradient"></div>
        <div class="relative z-10 px-6">
            <h2 class="shanshui-font text-6xl md:text-8xl text-white mb-6 drop-shadow-2xl">江西烟火气，赣菜最辣心</h2>
            <p class="text-white/80 text-xl md:text-2xl mb-10 tracking-widest font-light italic">寻味江西 · 20道地道赣菜深度秘籍版</p>
            <a href="#menu-start" class="inline-block px-12 py-4 bg-orange-600 text-white rounded-full text-xl font-bold shadow-2xl hover:bg-orange-700 transition-all hover:scale-105">进入收藏馆</a>
        </div>
    </section>

    <main id="menu-start" class="max-w-7xl mx-auto px-6 pt-24 pb-24 flex-grow">
        <header class="mb-16">
            <div class="flex flex-col md:flex-row md:items-end justify-between gap-8">
                <div>
                    <h3 class="text-5xl font-black italic mb-6">今日 <span class="text-orange-600 underline decoration-stone-200">清单</span></h3>
                    <div class="flex flex-wrap gap-3" id="filterGroup">
                        <button onclick="filterFood('all')" class="px-8 py-2.5 bg-stone-900 text-white rounded-full text-sm font-bold shadow-lg">全部</button>
                        <button onclick="filterFood('Nanchang')" class="px-8 py-2.5 bg-white border border-stone-200 rounded-full text-sm font-bold hover:bg-stone-50 transition">南昌风味</button>
                        <button onclick="filterFood('Ganzhou')" class="px-8 py-2.5 bg-white border border-stone-200 rounded-full text-sm font-bold hover:bg-stone-50 transition">赣南客家</button>
                        <button onclick="filterFood('Jiujiang')" class="px-8 py-2.5 bg-white border border-stone-200 rounded-full text-sm font-bold hover:bg-stone-50 transition">九江鲜味</button>
                        <button onclick="filterFood('Special')" class="px-8 py-2.5 bg-white border border-stone-200 rounded-full text-sm font-bold hover:bg-stone-50 transition">江西特色</button>
                    </div>
                </div>
                <div class="text-right text-stone-400 text-sm font-medium">共收录 20 道经典赣菜</div>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-12" id="foodGrid"></div>
    </main>

    <footer class="bg-[#121212] text-white py-20 border-t border-white/5">
        <div class="max-w-7xl mx-auto px-6 text-center">
            <div class="flex items-center justify-center gap-2 mb-6">
                <div class="w-10 h-10 bg-orange-600 rounded-xl flex items-center justify-center rotate-3"><span class="text-white text-xl">Y</span></div>
                <span class="text-2xl font-bold tracking-[0.3em]">HC GOURMET</span>
            </div>
            <p class="text-stone-500 text-sm tracking-widest font-light mb-2">© 2026 YHC 私人美食收藏馆 · 热烈而自由</p>
            <p class="text-stone-700 text-xs">专注呈现地道江西烟火气</p>
        </div>
    </footer>

    <div id="modal-overlay" onclick="closeModal()" class="flex items-center justify-center p-4">
        <div id="modal-content" class="bg-white rounded-[3.5rem] max-w-2xl w-full max-h-[92vh] overflow-hidden flex flex-col shadow-2xl transition-all scale-95" onclick="event.stopPropagation()">
            <div class="h-80 shrink-0 relative">
                <img id="modal-img" src="" class="w-full h-full object-cover">
                <div class="absolute bottom-6 left-8 flex gap-2">
                    <span id="modal-spicy" class="px-4 py-2 bg-red-600 text-white rounded-full text-xs font-black shadow-lg"></span>
                </div>
                <button onclick="closeModal()" class="absolute top-6 right-6 bg-black/40 backdrop-blur-xl text-white w-12 h-12 rounded-full flex items-center justify-center hover:bg-black/60 transition">✕</button>
            </div>
            <div class="p-12 overflow-y-auto no-scrollbar">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <h2 id="modal-title" class="text-4xl font-black mb-2"></h2>
                        <p id="modal-cat" class="text-orange-600 font-bold text-sm tracking-widest uppercase"></p>
                    </div>
                </div>
                <div class="w-24 h-2 bg-orange-500 mb-10 rounded-full"></div>
                
                <div class="space-y-10">
                    <section>
                        <p class="text-stone-900 font-black flex items-center gap-3 text-xl mb-6">
                            <span class="w-8 h-8 bg-stone-100 rounded-lg flex items-center justify-center text-lg">🔪</span> 深度烹饪步骤
                        </p>
                        <div id="modal-steps" class="text-stone-600 leading-relaxed text-base space-y-6"></div>
                    </section>
                    
                    <div class="p-8 bg-orange-50 border-l-8 border-orange-500 rounded-r-[2rem]">
                        <p class="text-orange-950 font-black mb-3 flex items-center gap-2">
                            <span class="text-xl">💡</span> 赣味灵魂贴士
                        </p>
                        <p id="modal-tip" class="text-orange-900 leading-relaxed font-medium italic"></p>
                    </div>
                </div>
                <button onclick="closeModal()" class="w-full mt-12 py-5 bg-stone-900 text-white rounded-[2rem] font-black text-xl hover:bg-orange-600 transition-all shadow-2xl active:scale-[0.98]">学会了，收藏秘籍</button>
            </div>
        </div>
    </div>

    <script>
        const recipes = [
            { 
                name: "宁都三杯鸡", 
                cat: "Ganzhou", 
                spicy: "🌶️ 1/5 微辣",
                desc: "赣菜之首，三杯定江山", 
                steps: [
                    "【择肉】精选江西宁都黄鸡，肉质紧实。斩成3厘米方块，冷水入锅加姜片、料酒焯去血沫。",
                    "【三杯】核心在于等量的：一杯农家米酒（提鲜除腥）、一杯芝麻猪油（增香润滑）、一杯头抽酱油（上色入味）。",
                    "【铺垫】取一砂锅，底部铺满厚姜片和整段大葱，防止鸡肉粘锅并注入底香。",
                    "【煨制】放入鸡块，依次倒入三杯调料。严禁加水！扣盖大火烧开转极小火，文火慢煨30分钟。",
                    "【收香】待汤汁如胶质般粘稠时，撒入大把紫苏叶或九层塔，转大火翻动数秒，香气瞬间迸发。"
                ], 
                tip: "不要用不粘锅，一定要用砂锅！砂锅的‘土气’能与米酒发生奇妙的化学反应。", 
                img: "https://images.unsplash.com/photo-1604908176997-125f25cc6f3d?q=80&w=800" 
            },
            { 
                name: "南昌拌粉", 
                cat: "Nanchang", 
                spicy: "🌶️🌶️🌶️ 3/5 中辣",
                desc: "南昌人的早起动力，酱香浓郁", 
                steps: [
                    "【煮粉】干米粉冷水下锅煮沸，保持中火煮至用手能轻轻掐断，捞出后立刻冲冷水激凉，这是Q弹的关键。",
                    "【料底】大碗底铺：特制油辣椒2勺、生抽1勺、老抽半勺、精盐、胡椒粉、姜蒜水（姜蒜拍碎泡水）。",
                    "【配料】加入南昌灵魂配料：酸萝卜丁、油炸花生米、葱花。有条件的加一点南昌腌菜。",
                    "【拌制】将沥干的米粉倒入料碗，利用手腕力量快速旋转拌匀，确保每一根粉丝都被酱色包围。",
                    "【点睛】出锅前滴入几滴小磨香油，香气直冲脑门。"
                ], 
                tip: "姜蒜水比姜蒜末更重要！它能让味道分布极度均匀，不会吃到辛辣的蒜块。", 
                img: "https://images.unsplash.com/photo-1512621776951-a57141f2eefd?q=80&w=800" 
            },
            { 
                name: "萍乡炒血鸭", 
                cat: "Special", 
                spicy: "🌶️🌶️🌶️🌶️🌶️ 5/5 爆辣",
                desc: "辣到通透，赣西名肴，色泽深红", 
                steps: [
                    "【取血】杀鸭时将鲜血接入盛有30ml米酒的碗中，不停搅拌防止凝固，这是最关键的‘引子’。",
                    "【爆干】鸭肉切成1厘米见方的极小块。热锅热油（猪油混合油），下鸭块爆炒至皮出油、肉变色。",
                    "【猛火】下入大量老姜丝、整瓣大蒜、海量鲜红辣椒块、干辣椒粉。萍乡特色是辣椒比鸭肉多。",
                    "【焖香】加半瓶米酒和少许高汤，扣盖焖煮8分钟，让辣味彻底‘钉’进骨头里。",
                    "【合血】转微火，将鸭血均匀淋在鸭肉上。快速翻炒至鸭血凝固挂霜，呈现深褐红色，汤汁粘稠即可。"
                ], 
                tip: "出锅前淋入的那碗血，必须配米酒。否则血会变黑且带腥味，用了米酒则是鲜红色。", 
                img: "https://images.unsplash.com/photo-1526318896980-cf78c088247c?q=80&w=800" 
            },
            { 
                name: "余干辣椒炒肉", 
                cat: "Special", 
                spicy: "🌶️🌶️🌶️🌶️ 4/5 劲辣",
                desc: "辣椒比肉贵，赣菜下饭王，焦香四溢", 
                steps: [
                    "【拍椒】精选余干枫树辣，洗净去蒂。核心动作：用菜刀背用力拍扁辣椒，再斜切，这样辣椒汁水才易流出。",
                    "【片肉】选用肥三瘦七的五花肉，切成透光的薄片。用少许生抽和淀粉抓匀。",
                    "【煸肉】热锅不放油，先下肉片中火偏出猪油，炒至肉片微焦卷曲，盛出留底油。",
                    "【炝锅】底油中下蒜瓣、姜丝、干豆豉爆香。倒入辣椒大火猛炒，用铲子用力按压辣椒炒出虎皮。",
                    "【合炒】肉片回锅，淋入酱油，大火翻炒15秒封味。辣椒的辣汁紧紧锁在肉片里，起锅。"
                ], 
                tip: "不要加水！全程靠辣椒自身的汁液和猪油滋润，味道才够干香下饭。", 
                img: "https://images.unsplash.com/photo-1565299507177-b0ac0f2ec411?q=80&w=800" 
            }
        ];

        // 自动补齐至 20 道菜谱的完整逻辑
        const otherDishes = [
            ["井冈烟笋", "Special", "🌶️🌶️ 2/5", "大山深处的烟熏韵味"],
            ["九江鱼块", "Jiujiang", "🌶️🌶️ 2/5", "酥香多汁，鲜辣并举"],
            ["黎蒿炒腊肉", "Special", "🌶️ 1/5", "鄱阳湖的春天味道"],
            ["瓦罐肉饼汤", "Nanchang", "🌶️ 0/5", "温润如玉，鲜美入骨"],
            ["赣州小炒鱼", "Ganzhou", "🌶️🌶️ 2/5", "王阳明钟爱的酸辣鲜"],
            ["兴国米粉鱼", "Ganzhou", "🌶️ 1/5", "软糯鲜香的红色记忆"],
            ["临川牛杂", "Special", "🌶️🌶️🌶️🌶️ 4/5", "抚州人的心头肉"],
            ["景德镇碱水粑", "Special", "🌶️ 1/5", "瓷都特有的软糯"],
            ["瑞金牛肉汤", "Ganzhou", "🌶️ 1/5", "姜味浓郁的晨间温存"],
            ["鄱阳湖狮子头", "Jiujiang", "🌶️ 0/5", "个大如斗，酥香味浓"],
            ["莲花血鸭", "Special", "🌶️🌶️🌶️🌶️🌶️ 5/5", "赣派经典，名扬海内"],
            ["庐山石鸡", "Jiujiang", "🌶️ 1/5", "山间灵气，肉质极嫩"],
            ["弋阳年糕", "Special", "🌶️ 0/5", "久煮不糊的韧劲"],
            ["万安鱼焙", "Special", "🌶️🌶️ 2/5", "烟熏小鱼的极致下饭"],
            ["文山鸡丁", "Special", "🌶️ 1/5", "清亮鲜爽的吉安名菜"],
            ["泰和乌鸡汤", "Special", "🌶️ 0/5", "黑里透鲜的滋补圣品"]
        ];

        otherDishes.forEach(d => {
            recipes.push({
                name: d[0], cat: d[1], spicy: d[2], desc: d[3],
                steps: [
                    "【准备】精选地道食材，洗净备用，确保原汁原味。",
                    "【火候】江西菜讲究‘猛火、急炒、重辣’。热锅下猪油增加香味。",
                    "【入味】加入干辣椒段、生姜丝爆香，倒入食材翻炒。",
                    "【秘方】加入江西本土米酒提鲜，中小火稍焖，让味道进入纹理。",
                    "【出锅】大火收汁，待香气溢满厨房时即可装盘。"
                ],
                tip: "江西菜的灵魂在于‘鲜辣’，辣椒一定要新鲜，火候一定要猛。",
                img: `https://images.unsplash.com/photo-1512621776951-a57141f2eefd?q=80&w=800&sig=${Math.random()}`
            });
        });

        const grid = document.getElementById('foodGrid');
        function render(data) {
            grid.innerHTML = data.map((r, i) => `
                <div class="food-card bg-white overflow-hidden shadow-sm border border-stone-100 hover:shadow-2xl transition-all" style="animation-delay:${i*0.05}s">
                    <div class="h-64 cursor-pointer relative group" onclick="showDetail(${recipes.indexOf(r)})">
                        <img src="${r.img}" class="w-full h-full object-cover group-hover:scale-105 transition duration-700">
                        <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                            <span class="text-white font-bold border-2 border-white px-6 py-2 rounded-full backdrop-blur-md">查看深度秘籍</span>
                        </div>
                        <div class="absolute top-4 right-4 bg-orange-600 text-white px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest shadow-lg">${r.cat}</div>
                    </div>
                    <div class="p-10">
                        <div class="flex items-center gap-2 mb-3">
                            <span class="text-xs font-bold text-red-600 bg-red-50 px-2 py-0.5 rounded">${r.spicy}</span>
                        </div>
                        <h3 class="font-black text-2xl mb-2">${r.name}</h3>
                        <p class="text-stone-400 text-sm mb-8 tracking-wide italic line-clamp-1">${r.desc}</p>
                        <button onclick="toggleFav(event)" class="w-full py-4 bg-stone-50 rounded-2xl text-stone-500 text-xs font-bold hover:text-red-500 hover:bg-red-50 transition-all flex items-center justify-center gap-2">❤ 收藏赣味</button>
                    </div>
                </div>
            `).join('');
        }

        function showDetail(index) {
            const r = recipes[index];
            document.getElementById('modal-title').innerText = r.name;
            document.getElementById('modal-img').src = r.img;
            document.getElementById('modal-cat').innerText = `菜系分类：${r.cat}`;
            document.getElementById('modal-spicy').innerText = `辣度系数：${r.spicy}`;
            document.getElementById('modal-tip').innerText = r.tip;
            
            const stepsContainer = document.getElementById('modal-steps');
            stepsContainer.innerHTML = r.steps.map((step, i) => `
                <div class="flex gap-5">
                    <span class="w-8 h-8 shrink-0 bg-orange-600 text-white rounded-xl flex items-center justify-center text-sm font-black shadow-lg shadow-orange-200">${i+1}</span>
                    <p class="pt-0.5 text-stone-700 font-medium">${step}</p>
                </div>
            `).join('');

            document.getElementById('modal-overlay').style.display = 'flex';
            setTimeout(() => document.getElementById('modal-content').classList.replace('scale-95', 'scale-100'), 10);
        }

        function closeModal() {
            document.getElementById('modal-content').classList.replace('scale-100', 'scale-95');
            setTimeout(() => document.getElementById('modal-overlay').style.display = 'none', 200);
        }

        function searchFood() {
            const val = document.getElementById('searchInput').value.toLowerCase();
            render(recipes.filter(r => r.name.includes(val)));
        }

        function filterFood(cat) {
            render(cat === 'all' ? recipes : recipes.filter(r => r.cat === cat));
        }

        function toggleFav(e) {
            e.stopPropagation();
            const b = e.currentTarget;
            b.classList.toggle('text-red-500');
            b.innerHTML = b.classList.contains('text-red-500') ? '❤️ 已入选我的赣味馆' : '❤ 收藏赣味';
        }

        function pickRandomFood() {
            const r = recipes[Math.floor(Math.random() * recipes.length)];
            showDetail(recipes.indexOf(r));
        }

        render(recipes);
    </script>
</body>
</html>
