<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YHC GOURMET | 私人美食收藏</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 引入更接近截图质感的字体 */
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@600&family=ZCOOL+KuaiLe&display=swap');

        body { scroll-behavior: smooth; background-color: #f9f9f9; }
        
        /* --- 核心还原：方案二 SVG Logo --- */
        .logo-box { display: flex; align-items: center; gap: 6px; cursor: pointer; transition: 0.3s; }
        .logo-box:hover { opacity: 0.8; }
        .chili-y-svg { width: 32px; height: 32px; filter: drop-shadow(0 2px 3px rgba(241, 90, 36, 0.3)); }
        .hc-brand-text { 
            font-family: 'Lexend', sans-serif; 
            font-size: 26px; 
            color: #4a4a4a; 
            letter-spacing: -0.5px;
            font-weight: 600;
        }

        /* --- 核心还原：导航按钮样式 (image_635987) --- */
        .nav-btn-normal { color: #5a6b7d; font-weight: 500; font-size: 16px; padding: 6px 12px; }
        .nav-btn-fav { 
            background-color: #fff1f2; 
            color: #ef4444; 
            border: 1px solid #fee2e2; 
            padding: 6px 18px; 
            border-radius: 999px; 
            display: flex; 
            align-items: center; 
            gap: 6px;
            font-weight: 500;
        }

        /* 封面与卡片 */
        .food-hero { 
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.7)), 
            url('https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&w=1600&q=80'); 
            background-size: cover; background-position: center;
        }
        .food-item { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; position: relative; }
        .food-item:hover { transform: translateY(-10px); }
        
        .fav-btn { position: absolute; top: 1rem; right: 1rem; z-index: 10; background: white/90; width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .fav-btn.active { color: #ef4444; }

        #modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; backdrop-filter: blur(10px); }
    </style>
</head>
<body class="text-gray-800">

    <nav class="fixed w-full bg-white/95 backdrop-blur-md shadow-sm z-50">
        <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
            
            <div class="logo-box" onclick="window.location.reload()">
                <svg class="chili-y-svg" viewBox="0 0 100 100">
                    <defs>
                        <linearGradient id="chiliGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#ff4d4d;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#f97316;stop-opacity:1" />
                        </linearGradient>
                    </defs>
                    <path d="M30,20 Q45,20 50,45 Q55,70 75,75 Q55,80 45,55 Q35,30 20,35 Z" fill="url(#chiliGrad)" />
                    <path d="M50,45 L70,20" stroke="url(#chiliGrad)" stroke-width="8" stroke-linecap="round" fill="none" />
                </svg>
                <span class="hc-brand-text">HC GOURMET</span>
            </div>
            
            <div class="flex items-center space-x-2 md:space-x-4">
                <button onclick="filterFood('all')" class="nav-btn-normal">全部</button>
                <button onclick="showFavorites()" class="nav-btn-fav">
                    <span style="font-size: 18px;">❤️</span> 收藏
                </button>
            </div>
        </div>
    </nav>

    <section class="food-hero h-[40vh] flex items-center justify-center text-white mt-14">
        <div class="text-center px-4">
            <h1 class="text-4xl md:text-6xl font-bold mb-4">人间烟火气</h1>
            <button onclick="pickRandomFood()" class="mt-4 bg-orange-500 hover:bg-orange-600 px-8 py-3 rounded-full font-bold transition-all shadow-lg">🎲 随机选菜</button>
        </div>
    </section>

    <div class="max-w-4xl mx-auto px-4 -mt-8">
        <input type="text" id="searchInput" onkeyup="searchFood()" placeholder="🔍 搜索美食名称..." 
            class="w-full p-4 rounded-2xl shadow-xl border-none focus:ring-2 focus:ring-orange-500 outline-none text-lg">
    </div>

    <section class="py-16 max-w-6xl mx-auto px-4">
        <div id="food-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
            
            <div class="food-item cn bg-white rounded-3xl overflow-hidden shadow-sm hover:shadow-xl" data-id="1">
                <button class="fav-btn" onclick="toggleFav(event, '1')">❤</button>
                <div onclick="showDetail('麻婆豆腐', 'https://assets.tmecosys.com/image/upload/t_web_rdp_recipe_584x480_1_5x/img/recipe/ras/Assets/0B16D5E2-C19B-4BEE-AD1B-75C63D23BE3C/Derivates/B8A0692E-CA25-439F-8F24-F1C5E74B42E1.jpg', '1. 豆腐切方块。<br>2. 炒香肉末豆瓣酱。<br>3. 下豆腐焖煮勾芡。', '💡 秘诀：花椒粉最后撒！')">
                    <img src="https://assets.tmecosys.com/image/upload/t_web_rdp_recipe_584x480_1_5x/img/recipe/ras/Assets/0B16D5E2-C19B-4BEE-AD1B-75C63D23BE3C/Derivates/B8A0692E-CA25-439F-8F24-F1C5E74B42E1.jpg" class="w-full h-56 object-cover">
                    <div class="p-5"><h3 class="food-name text-xl font-bold">麻婆豆腐</h3><p class="text-gray-400 text-sm mt-1">经典川菜 · 麻辣鲜香</p></div>
                </div>
            </div>

            <div class="food-item cn bg-white rounded-3xl overflow-hidden shadow-sm hover:shadow-xl" data-id="2">
                <button class="fav-btn" onclick="toggleFav(event, '2')">❤</button>
                <div onclick="showDetail('北京烤鸭', 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT6d8NcqTQaDr-jUCPvx4dIjrOqWsl17BZywg&s', '1. 烫皮晾干。<br>2. 180度烤制1小时。', '💡 秘诀：皮一定要晾干。')">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT6d8NcqTQaDr-jUCPvx4dIjrOqWsl17BZywg&s" class="w-full h-56 object-cover">
                    <div class="p-5"><h3 class="food-name text-xl font-bold">北京烤鸭</h3><p class="text-gray-400 text-sm mt-1">宫廷美味 · 皮脆肉嫩</p></div>
                </div>
            </div>

            <div class="food-item kr bg-white rounded-3xl overflow-hidden shadow-sm hover:shadow-xl" data-id="3">
                <button class="fav-btn" onclick="toggleFav(event, '3')">❤</button>
                <div onclick="showDetail('韩式炸鸡', 'https://images.unsplash.com/photo-1626082927389-6cd097cdc6ec?auto=format&fit=crop&w=800&q=80', '1. 炸两次。<br>2. 裹上甜辣酱。', '💡 秘诀：复炸是关键！')">
                    <img src="https://images.unsplash.com/photo-1626082927389-6cd097cdc6ec?auto=format&fit=crop&w=800&q=80" class="w-full h-56 object-cover">
                    <div class="p-5"><h3 class="food-name text-xl font-bold">韩式炸鸡</h3><p class="text-gray-400 text-sm mt-1">追剧必备 · 酥脆多汁</p></div>
                </div>
            </div>

            <div class="food-item kr bg-white rounded-3xl overflow-hidden shadow-sm hover:shadow-xl" data-id="4">
                <button class="fav-btn" onclick="toggleFav(event, '4')">❤</button>
                <div onclick="showDetail('石锅拌饭', 'https://images.unsplash.com/photo-1590301157890-4810ed352733?auto=format&fit=crop&w=800&q=80', '1. 配菜切丝。<br>2. 石锅涂油放饭。', '💡 锅巴是灵魂。')">
                    <img src="https://images.unsplash.com/photo-1590301157890-4810ed352733?auto=format&fit=crop&w=800&q=80" class="w-full h-56 object-cover">
                    <div class="p-5"><h3 class="food-name text-xl font-bold">石锅拌饭</h3></div>
                </div>
            </div>

            <div class="food-item kr bg-white rounded-3xl overflow-hidden shadow-sm hover:shadow-xl" data-id="5">
                <button class="fav-btn" onclick="toggleFav(event, '5')">❤</button>
                <div onclick="showDetail('韩式泡菜锅', 'https://life.anyongfresh.com/wp-content/uploads/2020/10/%E9%8D%8B%E5%BA%95%E7%B3%BB%E5%88%97-%E9%9F%93%E5%BC%8F%E6%B3%A1%E8%8F%9C%E9%8D%8B-600.jpg', '1. 五花肉泡菜同煮。', '💡 越久越入味。')">
                    <img src="https://life.anyongfresh.com/wp-content/uploads/2020/10/%E9%8D%8B%E5%BA%95%E7%B3%BB%E5%88%97-%E9%9F%93%E5%BC%8F%E6%B3%A1%E8%8F%9C%E9%8D%8B-600.jpg" class="w-full h-56 object-cover">
                    <div class="p-5"><h3 class="food-name text-xl font-bold">韩式泡菜锅</h3></div>
                </div>
            </div>

            <div class="food-item west bg-white rounded-3xl overflow-hidden shadow-sm hover:shadow-xl" data-id="6">
                <button class="fav-btn" onclick="toggleFav(event, '6')">❤</button>
                <div onclick="showDetail('战斧牛排', 'https://images.unsplash.com/photo-1544025162-d76694265947?auto=format&fit=crop&w=500&q=80', '1. 煎至五分熟。', '💡 记得静置。')">
                    <img src="https://images.unsplash.com/photo-1544025162-d76694265947?auto=format&fit=crop&w=500&q=80" class="w-full h-56 object-cover">
                    <div class="p-5"><h3 class="food-name text-xl font-bold">战斧牛排</h3></div>
                </div>
            </div>

            <div class="food-item west bg-white rounded-3xl overflow-hidden shadow-sm hover:shadow-xl" data-id="7">
                <button class="fav-btn" onclick="toggleFav(event, '7')">❤</button>
                <div onclick="showDetail('提拉米苏', 'https://images.unsplash.com/photo-1571877227200-a0d98ea607e9?auto=format&fit=crop&w=800&q=80', '1. 手指饼干泡咖啡。', '💡 不要泡太久。')">
                    <img src="https://images.unsplash.com/photo-1571877227200-a0d98ea607e9?auto=format&fit=crop&w=800&q=80" class="w-full h-56 object-cover">
                    <div class="p-5"><h3 class="food-name text-xl font-bold">提拉米苏</h3></div>
                </div>
            </div>

        </div>
    </section>

    <footer class="bg-white py-12 text-center border-t">
        <p class="text-gray-400 text-sm">© 2026 YHC GOURMET · 用心感受每一餐</p>
    </footer>

    <div id="modal-overlay" onclick="closeModal()">
        <div class="max-w-2xl mx-auto mt-20 bg-white rounded-[2rem] overflow-hidden shadow-2xl relative" onclick="event.stopPropagation()">
            <button class="absolute top-4 right-4 text-gray-400 text-2xl" onclick="closeModal()">✕</button>
            <img id="modal-img" class="w-full h-72 object-cover">
            <div class="p-8">
                <h2 id="modal-title" class="text-3xl font-bold text-orange-600 mb-4"></h2>
                <div id="modal-content" class="text-gray-600 mb-6"></div>
                <div id="modal-tip" class="p-4 bg-orange-50 text-orange-700 rounded-xl"></div>
            </div>
        </div>
    </div>

    <script>
        let favorites = JSON.parse(localStorage.getItem('yhcFavs')) || [];

        function updateFavUI() {
            document.querySelectorAll('.food-item').forEach(item => {
                const id = item.getAttribute('data-id');
                const btn = item.querySelector('.fav-btn');
                if(favorites.includes(id)) {
                    btn.classList.add('active');
                    btn.innerHTML = '❤️';
                } else {
                    btn.classList.remove('active');
                    btn.innerHTML = '❤';
                }
            });
        }

        function toggleFav(event, id) {
            event.stopPropagation();
            favorites = favorites.includes(id) ? favorites.filter(f => f !== id) : [...favorites, id];
            localStorage.setItem('yhcFavs', JSON.stringify(favorites));
            updateFavUI();
        }

        function showFavorites() {
            document.querySelectorAll('.food-item').forEach(item => {
                const id = item.getAttribute('data-id');
                item.style.display = favorites.includes(id) ? 'block' : 'none';
            });
        }

        function filterFood(cat) {
            document.querySelectorAll('.food-item').forEach(item => {
                item.style.display = (cat === 'all' || item.classList.contains(cat)) ? 'block' : 'none';
            });
        }

        function searchFood() {
            let input = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.food-item').forEach(item => {
                let name = item.querySelector('.food-name').innerText.toLowerCase();
                item.style.display = name.includes(input) ? "block" : "none";
            });
        }

        function showDetail(title, imgSrc, steps, tip) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-img').src = imgSrc;
            document.getElementById('modal-content').innerHTML = `<strong>👨‍🍳 做法：</strong><br>${steps}`;
            document.getElementById('modal-tip').innerText = tip;
            document.getElementById('modal-overlay').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('modal-overlay').style.display = 'none';
        }

        function pickRandomFood() {
            const items = document.querySelectorAll('.food-item');
            const randomItem = items[Math.floor(Math.random() * items.length)];
            randomItem.querySelector('div[onclick]').click();
        }

        updateFavUI();
    </script>
</body>
</html>
