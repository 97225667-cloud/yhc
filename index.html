<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YHC GOURMET | 20道私人美食收藏</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Quicksand:wght@700&display=swap');

        body { scroll-behavior: smooth; }
        .food-hero { 
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.7)), 
            url('https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&w=1600&q=80'); 
            background-size: cover; background-position: center; background-attachment: fixed;
        }
        
        /* —————————— 方案二：手写火焰 Logo —————————— */
        .yhc-chili-logo { display: flex; align-items: center; cursor: pointer; gap: 4px; }
        .chili-y-icon {
            font-family: 'Permanent Marker', cursive;
            font-size: 42px;
            background: linear-gradient(135deg, #ff4d4d 0%, #f97316 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            transform: rotate(-10deg) skewX(-5deg);
            display: inline-block;
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.1));
            line-height: 1;
        }
        .hc-text-style {
            font-family: 'Quicksand', sans-serif;
            font-size: 28px;
            color: #4a4a4a;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-top: 5px;
        }

        /* 动画 */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .food-item { animation: fadeInUp 0.5s ease backwards; transition: all 0.3s ease; cursor: pointer; position: relative; }
        .food-item:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        
        /* 收藏按钮样式还原 (image_635987) */
        .nav-btn-fav { 
            background-color: #fff1f2; 
            color: #ef4444; 
            border: 1px solid #fee2e2; 
            padding: 6px 18px; 
            border-radius: 999px; 
            display: flex; 
            align-items: center; 
            gap: 6px;
            font-weight: 700;
        }

        .fav-btn { position: absolute; top: 1rem; right: 1rem; z-index: 10; background: white/90; width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: all 0.2s; border: none; }
        .fav-btn.active { color: #ef4444; transform: scale(1.15); }

        #modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 100; backdrop-filter: blur(8px); }
        .lucky-btn { background: linear-gradient(45deg, #ef4444, #f59e0b); box-shadow: 0 10px 15px -3px rgba(239, 68, 68, 0.3); }
    </style>
</head>
<body class="bg-stone-50 text-gray-800 font-sans">

    <nav class="fixed w-full bg-white/95 backdrop-blur-md shadow-sm z-50">
        <div class="max-w-6xl mx-auto px-4 py-2 flex justify-between items-center">
            <div class="yhc-chili-logo" onclick="window.location.reload()">
                <span class="chili-y-icon">Y</span>
                <span class="hc-text-style">HC GOURMET</span>
            </div>
            <div class="flex space-x-4 md:space-x-8 text-gray-600 font-bold text-sm items-center">
                <button onclick="filterFood('all')" class="hover:text-orange-500 transition">全部</button>
                <button onclick="filterFood('cn')" class="hover:text-orange-500 transition hidden md:block">中餐</button>
                <button onclick="filterFood('kr')" class="hover:text-orange-500 transition hidden md:block">韩餐</button>
                <button onclick="filterFood('west')" class="hover:text-orange-500 transition hidden md:block">西餐</button>
                <button onclick="showFavorites()" class="nav-btn-fav transition-all hover:scale-105">❤️ 收藏</button>
            </div>
        </div>
    </nav>

    <section class="food-hero h-[45vh] flex items-center justify-center text-white mt-14">
        <div class="text-center px-4">
            <h1 class="text-5xl md:text-7xl font-black mb-4 drop-shadow-2xl">人间烟火气</h1>
            <p class="text-xl opacity-90 font-medium mb-8">20道精选料理，记录生活的温度</p>
            <button onclick="pickRandomFood()" class="lucky-btn px-10 py-4 rounded-full font-bold text-lg hover:scale-105 transition-all active:scale-95">🎲 帮我选一个</button>
        </div>
    </section>

    <section class="pt-10 pb-6 px-4 max-w-6xl mx-auto">

            class="w-full p-5 rounded-2xl border-2 border-stone-200 focus:border-orange-500 focus:outline-none shadow-inner text-lg transition-all">
    </section>

    <div id="modal-overlay" onclick="closeModal()">
        <div class="max-w-2xl mx-auto mt-20 bg-white rounded-[2.5rem] overflow-hidden shadow-2xl relative animate-in zoom-in duration-300" onclick="event.stopPropagation()">
            <button class="absolute top-5 right-5 bg-black/10 hover:bg-black/30 text-white w-10 h-10 rounded-full flex items-center justify-center transition-all" onclick="closeModal()">✕</button>
            <img id="modal-img" class="w-full h-80 object-cover">
            <div class="p-10">
                <h2 id="modal-title" class="text-4xl font-black text-stone-900 mb-2"></h2>
                <div class="h-1.5 w-16 bg-orange-500 rounded-full mb-8"></div>
                <div id="modal-content" class="text-gray-600 leading-relaxed mb-8 text-lg"></div>
                <div id="modal-tip" class="p-5 bg-orange-50 border-l-8 border-orange-500 text-orange-900 rounded-xl font-medium"></div>
            </div>
        </div>

    <script>
        let favorites = JSON.parse(localStorage.getItem('yhcFinalFavs')) || [];

        function updateFavUI() {
            document.querySelectorAll('.food-item').forEach(item => {
                const id = item.getAttribute('data-id');
                const btn = item.querySelector('.fav-btn');
                if(favorites.includes(id)) {
                    btn.classList.add('active');
                    btn.innerHTML = '❤️';
                } else {
                    btn.classList.remove('active');
                    btn.innerHTML = '❤';
                }
            });
        }

        function toggleFav(event, id) {
            event.stopPropagation();
            favorites = favorites.includes(id) ? favorites.filter(f => f !== id) : [...favorites, id];
            localStorage.setItem('yhcFinalFavs', JSON.stringify(favorites));
            updateFavUI();
        }

        function showFavorites() {
            document.querySelectorAll('.food-item').forEach(item => {
                const id = item.getAttribute('data-id');
                item.style.display = favorites.includes(id) ? 'block' : 'none';
            });
            window.scrollTo({ top: document.getElementById('food-grid').offsetTop - 100, behavior: 'smooth' });
        }

        function filterFood(cat) {
            document.querySelectorAll('.food-item').forEach(item => {
                item.style.display = (cat === 'all' || item.classList.contains(cat)) ? 'block' : 'none';
            });
        }

        function searchFood() {
            let input = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.food-item').forEach(item => {
                let name = item.querySelector('.food-name').innerText.toLowerCase();
                item.style.display = name.includes(input) ? "block" : "none";
            });
        }

        function showDetail(title, imgSrc, steps, tip) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-img').src = imgSrc;
            document.getElementById('modal-content').innerHTML = `<strong>👨‍🍳 烹饪秘籍：</strong><br><br>${steps}`;
            document.getElementById('modal-tip').innerText = tip;
            document.getElementById('modal-overlay').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modal-overlay').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function pickRandomFood() {
            const items = Array.from(document.querySelectorAll('.food-item'));
            const randomItem = items[Math.floor(Math.random() * items.length)];
            randomItem.querySelector('div[onclick]').click();
        }

        updateFavUI();
    </script>
