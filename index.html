<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YHC GOURMET | 私人美食收藏</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { scroll-behavior: smooth; }
        .food-hero { 
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.7)), 
            url('https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&w=1600&q=80'); 
            background-size: cover; background-position: center; background-attachment: fixed;
        }
        
        /* 定制 Logo 样式 */
        .logo-container { display: flex; align-items: center; gap: 8px; transition: all 0.3s ease; }
        .logo-container:hover { transform: scale(1.05); }
        .logo-chili { font-size: 28px; filter: drop-shadow(0 2px 4px rgba(239, 68, 68, 0.4)); }
        .logo-text {
            font-family: 'Arial Black', sans-serif;
            background: linear-gradient(to right, #ef4444, #f97316);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
            letter-spacing: -1px;
        }

        /* 动画与交互 */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .food-item { animation: fadeInUp 0.6s ease backwards; transition: all 0.3s ease; cursor: pointer; position: relative; }
        .food-item:hover { transform: translateY(-10px); }
        
        .food-item:nth-child(1) { animation-delay: 0.1s; }
        .food-item:nth-child(2) { animation-delay: 0.2s; }
        .food-item:nth-child(3) { animation-delay: 0.3s; }
        .food-item:nth-child(4) { animation-delay: 0.4s; }
        .food-item:nth-child(5) { animation-delay: 0.5s; }
        .food-item:nth-child(6) { animation-delay: 0.6s; }
        .food-item:nth-child(7) { animation-delay: 0.7s; }

        .fav-btn { position: absolute; top: 1rem; right: 1rem; z-index: 10; background: white/90; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border: none; transition: all 0.2s; }
        .fav-btn.active { color: #ef4444; background: white; transform: scale(1.1); }

        #modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 100; backdrop-filter: blur(8px); }
        .lucky-btn { background: linear-gradient(45deg, #ef4444, #f59e0b); }
    </style>
</head>
<body class="bg-stone-50 text-gray-800 font-sans">

    <nav class="fixed w-full bg-white/90 backdrop-blur-md shadow-sm z-50">
        <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="logo-container cursor-pointer" onclick="window.location.reload()">
                <span class="logo-chili">🌶️</span>
                <span class="logo-text text-2xl md:text-3xl">YHC GOURMET</span>
            </div>
            <div class="flex space-x-3 md:space-x-6 text-gray-600 font-medium text-sm">
                <button onclick="filterFood('all')" class="hover:text-orange-500">全部</button>
                <button onclick="showFavorites()" class="text-red-500 flex items-center gap-1 bg-red-50 px-3 py-1 rounded-full border border-red-100">❤️ 收藏</button>
            </div>
        </div>
    </nav>

    <section class="food-hero h-[50vh] flex items-center justify-center text-white mt-14">
        <div class="text-center px-4">
            <h1 class="text-4xl md:text-6xl font-black mb-4 drop-shadow-lg">烟火气里的 YHC</h1>
            <p class="text-lg opacity-90 font-light mb-8 italic">让每一道菜都拥有故事</p>
            <button onclick="pickRandomFood()" class="lucky-btn px-8 py-3 rounded-full font-bold shadow-xl hover:scale-110 transition-all active:scale-95">🎲 纠结星人点我随机选菜</button>
        </div>
    </section>

    <section id="search-area" class="pt-12 pb-6 px-4 max-w-6xl mx-auto">
        <input type="text" id="searchInput" onkeyup="searchFood()" placeholder="🔍 搜搜你想吃的（名称、菜系）..." 
            class="w-full p-4 rounded-2xl border-2 border-orange-50 focus:border-orange-500 focus:outline-none shadow-sm text-lg">
    </section>

    <section class="pb-20 max-w-6xl mx-auto px-4">
        <div id="food-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
            
            <div class="food-item cn bg-white rounded-3xl overflow-hidden shadow-md" data-id="1">
                <button class="fav-btn" onclick="toggleFav(event, '1')">❤</button>
                <div onclick="showDetail('麻婆豆腐', 'https://assets.tmecosys.com/image/upload/t_web_rdp_recipe_584x480_1_5x/img/recipe/ras/Assets/0B16D5E2-C19B-4BEE-AD1B-75C63D23BE3C/Derivates/B8A0692E-CA25-439F-8F24-F1C5E74B42E1.jpg', '1. 豆腐切方块，牛肉切末。<br>2. 炒香豆瓣酱、姜蒜末、豆豉。<br>3. 加入高汤和豆腐烧开，小火焖煮。<br>4. 勾三次薄芡，撒上花椒粉。', '💡 秘诀：花椒粉一定要最后撒，香味才最浓！')">
                    <img src="https://assets.tmecosys.com/image/upload/t_web_rdp_recipe_584x480_1_5x/img/recipe/ras/Assets/0B16D5E2-C19B-4BEE-AD1B-75C63D23BE3C/Derivates/B8A0692E-CA25-439F-8F24-F1C5E74B42E1.jpg" class="w-full h-56 object-cover">
                    <div class="p-5"><span class="text-red-600 text-xs font-bold px-2 py-1 bg-red-50 rounded">中餐</span><h3 class="food-name text-xl font-bold mt-2">麻婆豆腐</h3></div>
                </div>
            </div>

            <div class="food-item cn bg-white rounded-3xl overflow-hidden shadow-md" data-id="2">
                <button class="fav-btn" onclick="toggleFav(event, '2')">❤</button>
                <div onclick="showDetail('北京烤鸭', 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT6d8NcqTQaDr-jUCPvx4dIjrOqWsl17BZywg&s', '1. 鸭子洗净烫皮，全身涂抹脆皮水。<br>2. 烤箱180°C烤制1小时。<br>3. 搭配荷叶饼、甜面酱食用。', '💡 秘诀：进烤箱前皮一定要晾干，才会酥脆！')">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT6d8NcqTQaDr-jUCPvx4dIjrOqWsl17BZywg&s" class="w-full h-56 object-cover">
                    <div class="p-5"><span class="text-red-600 text-xs font-bold px-2 py-1 bg-red-50 rounded">中餐</span><h3 class="food-name text-xl font-bold mt-2">北京烤鸭</h3></div>
                </div>
            </div>

            <div class="food-item kr bg-white rounded-3xl overflow-hidden shadow-md" data-id="3">
                <button class="fav-btn" onclick="toggleFav(event, '3')">❤</button>
                <div onclick="showDetail('韩式炸鸡', 'https://images.unsplash.com/photo-1626082927389-6cd097cdc6ec?auto=format&fit=crop&w=800&q=80', '1. 鸡块腌制，裹粉炸两次。<br>2. 拌入韩式甜辣酱，撒上白芝麻。', '💡 秘诀：复炸一次是保持酥脆的关键！')">
                    <img src="https://images.unsplash.com/photo-1626082927389-6cd097cdc6ec?auto=format&fit=crop&w=800&q=80" class="w-full h-56 object-cover">
                    <div class="p-5"><span class="text-blue-600 text-xs font-bold px-2 py-1 bg-blue-50 rounded">韩餐</span><h3 class="food-name text-xl font-bold mt-2">韩式炸鸡</h3></div>
                </div>
            </div>

            <div class="food-item kr bg-white rounded-3xl overflow-hidden shadow-md" data-id="4">
                <button class="fav-btn" onclick="toggleFav(event, '4')">❤</button>
                <div onclick="showDetail('石锅拌饭', 'https://images.unsplash.com/photo-1590301157890-4810ed352733?auto=format&fit=crop&w=800&q=80', '1. 蔬菜炒熟铺在米饭上。<br>2. 石锅底涂香油，加热出锅巴。<br>3. 加入辣酱和蛋拌匀。', '💡 秘诀：石锅底抹一层香油，锅巴会更香！')">
                    <img src="https://images.unsplash.com/photo-1590301157890-4810ed352733?auto=format&fit=crop&w=800&q=80" class="w-full h-56 object-cover">
                    <div class="p-5"><span class="text-blue-600 text-xs font-bold px-2 py-1 bg-blue-50 rounded">韩餐</span><h3 class="food-name text-xl font-bold mt-2">石锅拌饭</h3></div>
                </div>
            </div>

            <div class="food-item kr bg-white rounded-3xl overflow-hidden shadow-md" data-id="5">
                <button class="fav-btn" onclick="toggleFav(event, '5')">❤</button>
                <div onclick="showDetail('韩式泡菜锅', 'https://life.anyongfresh.com/wp-content/uploads/2020/10/%E9%8D%8B%E5%BA%95%E7%B3%BB%E5%88%97-%E9%9F%93%E5%BC%8F%E6%B3%A1%E8%8F%9C%E9%8D%8B-600.jpg', '1. 五花肉煸炒，放入泡菜、辣酱。<br>2. 加入淘米水、豆腐、午餐肉煮沸。', '💡 秘诀：一定要用酸掉的老泡菜才有灵魂！')">
                    <img src="https://life.anyongfresh.com/wp-content/uploads/2020/10/%E9%8D%8B%E5%BA%95%E7%B3%BB%E5%88%97-%E9%9F%93%E5%BC%8F%E6%B3%A1%E8%8F%9C%E9%8D%8B-600.jpg" class="w-full h-56 object-cover">
                    <div class="p-5"><span class="text-blue-600 text-xs font-bold px-2 py-1 bg-blue-50 rounded">韩餐</span><h3 class="food-name text-xl font-bold mt-2">韩式泡菜锅</h3></div>
                </div>
            </div>

            <div class="food-item west bg-white rounded-3xl overflow-hidden shadow-md" data-id="6">
                <button class="fav-btn" onclick="toggleFav(event, '6')">❤</button>
                <div onclick="showDetail('战斧牛排', 'https://images.unsplash.com/photo-1544025162-d76694265947?auto=format&fit=crop&w=500&q=80', '1. 撒黑胡椒和海盐。<br>2. 锅烧热煎封肉汁。<br>3. 加入黄油和迷迭香淋洗。', '💡 秘诀：煎完后静置5分钟，肉汁才不会流失。')">
                    <img src="https://images.unsplash.com/photo-1544025162-d76694265947?auto=format&fit=crop&w=500&q=80" class="w-full h-56 object-cover">
                    <div class="p-5"><span class="text-amber-600 text-xs font-bold px-2 py-1 bg-amber-50 rounded">西餐</span><h3 class="food-name text-xl font-bold mt-2">战斧牛排</h3></div>
                </div>
            </div>

            <div class="food-item west bg-white rounded-3xl overflow-hidden shadow-md" data-id="7">
                <button class="fav-btn" onclick="toggleFav(event, '7')">❤</button>
                <div onclick="showDetail('提拉米苏', 'https://images.unsplash.com/photo-1571877227200-a0d98ea607e9?auto=format&fit=crop&w=800&q=80', '1. 混合马斯卡彭芝士糊。<br>2. 饼干浸泡咖啡液叠放。<br>3. 冷藏4小时，吃前撒可可粉。', '💡 秘诀：饼干蘸咖啡液要快，不然会太烂。')">
                    <img src="https://images.unsplash.com/photo-1571877227200-a0d98ea607e9?auto=format&fit=crop&w=800&q=80" class="w-full h-56 object-cover">
                    <div class="p-5"><span class="text-amber-600 text-xs font-bold px-2 py-1 bg-amber-50 rounded">西餐</span><h3 class="food-name text-xl font-bold mt-2">提拉米苏</h3></div>
                </div>
            </div>

        </div>
    </section>

    <footer class="bg-stone-900 text-stone-500 py-12 text-center text-xs border-t border-stone-800">
        <p class="text-stone-300 font-bold mb-2">🌶️ YHC GOURMET</p>
        <p>© 2026 用心记录美味 · 享受烟火生活</p>
    </footer>

    <div id="modal-overlay" onclick="closeModal()">
        <div class="max-w-2xl mx-auto mt-20 bg-white rounded-[2rem] overflow-hidden shadow-2xl relative" onclick="event.stopPropagation()">
            <button class="absolute top-4 right-4 bg-black/10 hover:bg-black/30 w-8 h-8 rounded-full flex items-center justify-center text-white" onclick="closeModal()">✕</button>
            <img id="modal-img" class="w-full h-72 object-cover">
            <div class="p-8">
                <h2 id="modal-title" class="text-3xl font-bold text-orange-600 mb-2"></h2>
                <div id="modal-content" class="text-gray-600 mb-6 text-sm leading-relaxed"></div>
                <div id="modal-tip" class="p-4 bg-orange-50 border-l-4 border-orange-500 text-orange-800 rounded"></div>
            </div>
        </div>
    </div>

    <script>
        let favorites = JSON.parse(localStorage.getItem('yhcFavs')) || [];

        function updateFavUI() {
            document.querySelectorAll('.food-item').forEach(item => {
                const id = item.getAttribute('data-id');
                const btn = item.querySelector('.fav-btn');
                if(favorites.includes(id)) {
                    btn.classList.add('active');
                    btn.innerHTML = '❤️';
                } else {
                    btn.classList.remove('active');
                    btn.innerHTML = '❤';
                }
            });
        }

        function toggleFav(event, id) {
            event.stopPropagation();
            favorites = favorites.includes(id) ? favorites.filter(f => f !== id) : [...favorites, id];
            localStorage.setItem('yhcFavs', JSON.stringify(favorites));
            updateFavUI();
        }

        function showFavorites() {
            document.querySelectorAll('.food-item').forEach(item => {
                const id = item.getAttribute('data-id');
                item.style.display = favorites.includes(id) ? 'block' : 'none';
            });
        }

        function filterFood(cat) {
            document.querySelectorAll('.food-item').forEach(item => {
                item.style.display = (cat === 'all' || item.classList.contains(cat)) ? 'block' : 'none';
            });
        }

        function searchFood() {
            let input = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.food-item').forEach(item => {
                let name = item.querySelector('.food-name').innerText.toLowerCase();
                item.style.display = name.includes(input) ? "block" : "none";
            });
        }

        function showDetail(title, imgSrc, steps, tip) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-img').src = imgSrc;
            document.getElementById('modal-content').innerHTML = `<strong>👨‍🍳 烹饪步骤：</strong><br>${steps}`;
            document.getElementById('modal-tip').innerText = tip;
            document.getElementById('modal-overlay').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modal-overlay').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function pickRandomFood() {
            const items = document.querySelectorAll('.food-item');
            const randomItem = items[Math.floor(Math.random() * items.length)];
            randomItem.querySelector('div[onclick]').click();
        }

        updateFavUI();
    </script>
</body>
</html>
