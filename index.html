<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的美食私人收藏</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { scroll-behavior: smooth; }
        .food-hero { 
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
            url('https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&w=1200&q=80'); 
            background-size: cover; 
            background-position: center; 
        }
        /* 增加切换动画效果 */
        .food-item { transition: all 0.4s ease; }
    </style>
</head>
<body class="bg-stone-50 text-gray-800 font-sans">

    <nav class="fixed w-full bg-white/90 backdrop-blur-md shadow-sm z-50">
        <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
            <span class="text-2xl font-bold text-orange-600 flex items-center gap-2">
                🍴 <span class="hidden sm:inline">美食大赏</span>
            </span>
            <div class="flex space-x-3 md:space-x-8 text-gray-600 font-medium text-sm md:text-base">
                <button onclick="filterFood('all')" class="hover:text-orange-500 transition border-b-2 border-transparent hover:border-orange-500 pb-1">全部</button>
                <button onclick="filterFood('cn')" class="hover:text-orange-500 transition border-b-2 border-transparent hover:border-orange-500 pb-1">中餐</button>
                <button onclick="filterFood('kr')" class="hover:text-orange-500 transition border-b-2 border-transparent hover:border-orange-500 pb-1">韩餐</button>
                <button onclick="filterFood('west')" class="hover:text-orange-500 transition border-b-2 border-transparent hover:border-orange-500 pb-1">西餐</button>
            </div>
        </div>
    </nav>

    <section class="food-hero h-[40vh] flex items-center justify-center text-white">
        <div class="text-center px-4">
            <h1 class="text-3xl md:text-5xl font-black mb-4 tracking-tight text-white shadow-sm">人间烟火气，最抚凡人心</h1>
            <p class="text-base md:text-lg opacity-90 font-light">这里记录了我私藏的所有美味瞬间</p>
        </div>
    </section>

    <section id="collection" class="py-12 max-w-6xl mx-auto px-4">
        <div id="food-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
            
            <div class="food-item cn bg-white rounded-2xl overflow-hidden shadow-md hover:shadow-xl border border-stone-100">
                <img src="https://images.unsplash.com/photo-1512058560550-42749359a767?auto=format&fit=crop&w=500&q=80" alt="中餐" class="w-full h-56 object-cover">
                <div class="p-5">
                    <span class="px-2 py-1 bg-red-100 text-red-600 text-[10px] font-bold rounded-md uppercase tracking-wider">中餐专区</span>
                    <h3 class="text-xl font-bold mt-2 mb-2">广式虾饺</h3>
                    <p class="text-gray-500 text-sm italic">晶莹剔透的外皮，包裹着饱满鲜甜的虾仁，早茶必点。</p>
                </div>
            </div>

            <div class="food-item kr bg-white rounded-2xl overflow-hidden shadow-md hover:shadow-xl border border-stone-100">
                <img src="https://images.unsplash.com/photo-1498654077810-12c21d4d6dc3?auto=format&fit=crop&w=500&q=80" alt="韩餐" class="w-full h-56 object-cover">
                <div class="p-5">
                    <span class="px-2 py-1 bg-blue-100 text-blue-600 text-[10px] font-bold rounded-md uppercase tracking-wider">韩餐专区</span>
                    <h3 class="text-xl font-bold mt-2 mb-2">韩式泡菜锅</h3>
                    <p class="text-gray-500 text-sm italic">酸辣开胃，冬天里的一碗泡菜汤能瞬间驱散寒意。</p>
                </div>
            </div>

            <div class="food-item west bg-white rounded-2xl overflow-hidden shadow-md hover:shadow-xl border border-stone-100">
                <img src="https://images.unsplash.com/photo-1544025162-d76694265947?auto=format&fit=crop&w=500&q=80" alt="西餐" class="w-full h-56 object-cover">
                <div class="p-5">
                    <span class="px-2 py-1 bg-amber-100 text-amber-600 text-[10px] font-bold rounded-md uppercase tracking-wider">西餐专区</span>
                    <h3 class="text-xl font-bold mt-2 mb-2">战斧牛排</h3>
                    <p class="text-gray-500 text-sm italic">高温炙烤锁住肉汁，原汁原味是对肉类最高的尊重。</p>
                </div>
            </div>

            </div>
    </section>

    <footer class="bg-white border-t border-stone-200 py-10 text-center">
        <p class="text-gray-400 text-xs tracking-widest uppercase mb-2">My Food Collection</p>
        <p class="text-gray-600 font-serif">记录味蕾的每一次旅行</p>
    </footer>

    <script>
        function filterFood(category) {
            const items = document.querySelectorAll('.food-item');
            
            items.forEach(item => {
                // 先给一个淡出效果
                item.style.opacity = '0';
                item.style.transform = 'scale(0.9)';
                
                setTimeout(() => {
                    if (category === 'all' || item.classList.contains(category)) {
                        item.style.display = 'block';
                        // 延迟一点显示，做个动画
                        setTimeout(() => {
                            item.style.opacity = '1';
                            item.style.transform = 'scale(1)';
                        }, 50);
                    } else {
                        item.style.display = 'none';
                    }
                }, 300);
            });
        }
    </script>

</body>
</html>
