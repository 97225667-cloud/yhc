<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YHC GOURMET | 人间烟火气</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    <style>
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .food-card { animation: fadeInUp 0.6s ease forwards; opacity: 0; border-radius: 2.5rem !important; }
        .logo-font { font-family: 'Permanent Marker', cursive; }
        .shanshui-font { font-family: 'Ma Shan Zheng', cursive; }
        #modal-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(12px); display: none; z-index: 100; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        html { scroll-behavior: smooth; }
        .hero-gradient { background: linear-gradient(to bottom, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.8) 100%); }
        /* 还原 image_64d563.png 的标题倾斜感 */
        .section-title { font-style: italic; font-weight: 900; font-size: 2.25rem; }
    </style>
</head>
<body class="bg-stone-50 text-stone-800 flex flex-col min-h-screen">

    <nav class="fixed top-0 w-full z-50 bg-white/90 backdrop-blur-md border-b border-stone-100">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between gap-4">
            <div class="flex items-center gap-2 shrink-0">
                <div class="w-8 h-8 bg-orange-500 rounded-lg flex items-center justify-center rotate-3 shadow-lg">
                    <span class="text-white text-xl font-bold">Y</span>
                </div>
                <h1 class="text-xl font-black text-stone-700 tracking-tight">HC GOURMET</h1>
            </div>

            <div class="flex-grow max-w-md hidden md:block">
                <div class="flex items-center bg-stone-100 rounded-full px-4 py-2 border border-stone-200">
                    <span class="text-stone-400 mr-2">🔍</span>
                    <input type="text" id="searchInput" onkeyup="searchFood()" placeholder="搜寻你想吃的..." 
                           class="bg-transparent border-none outline-none w-full text-sm text-stone-600 placeholder-stone-400">
                </div>
            </div>
            
            <button class="bg-red-50 text-red-500 px-5 py-2 rounded-full font-bold text-sm flex items-center gap-2 border border-red-100">
                ❤️ 收藏
            </button>
        </div>
    </nav>

    <section class="relative h-[80vh] w-full overflow-hidden flex items-center justify-center text-center">
        <img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836?q=80&w=2000" class="absolute inset-0 w-full h-full object-cover">
        <div class="absolute inset-0 hero-gradient"></div>
        <div class="relative z-10 px-6">
            <h2 class="shanshui-font text-6xl md:text-8xl text-white mb-6 drop-shadow-2xl">人间烟火气，最抚凡人心</h2>
            <p class="text-white/80 text-xl md:text-2xl mb-10 font-light tracking-widest">为您呈现 私人定制的美食清单</p>
            <a href="#menu-start" class="inline-block px-10 py-4 bg-orange-500 text-white rounded-full text-xl font-bold shadow-2xl hover:bg-orange-600 transition-transform hover:scale-105">开启味觉之旅</a>
        </div>
    </section>

    <main id="menu-start" class="max-w-7xl mx-auto px-6 pt-20 pb-20 flex-grow">
        <header class="mb-12">
            <h3 class="section-title mb-6">今日 <span class="text-orange-500">清单</span></h3>
            <div class="flex flex-wrap items-center justify-between gap-4">
                <div class="flex flex-wrap gap-2">
                    <button onclick="filterFood('all')" class="px-6 py-2 bg-stone-900 text-white rounded-full text-sm font-bold shadow-md">全部</button>
                    <button onclick="filterFood('Sichuan')" class="px-6 py-2 bg-white border border-stone-200 rounded-full text-sm font-bold hover:bg-stone-100">川味</button>
                    <button onclick="filterFood('Cantonese')" class="px-6 py-2 bg-white border border-stone-200 rounded-full text-sm font-bold hover:bg-stone-100">粤式</button>
                    <button onclick="filterFood('Home')" class="px-6 py-2 bg-white border border-stone-200 rounded-full text-sm font-bold hover:bg-stone-100">家常</button>
                    <button onclick="filterFood('Global')" class="px-6 py-2 bg-white border border-stone-200 rounded-full text-sm font-bold hover:bg-stone-100">异国风味</button>
                </div>
                <button onclick="pickRandomFood()" class="px-6 py-3 bg-orange-100 text-orange-600 rounded-2xl font-black flex items-center gap-2 hover:bg-orange-200 transition">
                    🎲 帮我决定
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-10" id="foodGrid"></div>
    </main>

    <footer class="bg-[#141414] text-white py-16">
        <div class="max-w-7xl mx-auto px-6 text-center">
            <div class="flex items-center justify-center gap-2 mb-4">
                <span class="text-orange-500 text-3xl font-bold">Y</span>
                <span class="text-2xl font-bold tracking-[0.2em]">HC GOURMET</span>
            </div>
            <p class="text-stone-500 text-sm tracking-widest font-light">© 2026 YHC 私人美食收藏馆 · 热烈而自由</p>
        </div>
    </footer>

    <div id="modal-overlay" onclick="closeModal()" class="flex items-center justify-center p-4">
        <div id="modal-content" class="bg-white rounded-[3.5rem] max-w-md w-full max-h-[85vh] overflow-hidden flex flex-col shadow-2xl transition-all scale-95" onclick="event.stopPropagation()">
            <div class="h-60 shrink-0 relative">
                <img id="modal-img" src="" class="w-full h-full object-cover">
                <button onclick="closeModal()" class="absolute top-6 right-6 bg-black/20 backdrop-blur-md text-white w-10 h-10 rounded-full flex items-center justify-center">✕</button>
            </div>
            <div class="p-10 overflow-y-auto no-scrollbar">
                <h2 id="modal-title" class="text-3xl font-black mb-2"></h2>
                <div class="w-12 h-1 bg-orange-500 mb-8 rounded-full"></div>
                <div class="space-y-6">
                    <p class="text-stone-800 font-bold flex items-center gap-2 text-lg">👩‍🍳 烹饪秘籍：</p>
                    <p id="modal-steps" class="text-stone-600 leading-loose text-base whitespace-pre-line"></p>
                    <div class="p-6 bg-orange-50 border-l-8 border-orange-500 rounded-r-3xl">
                        <p id="modal-tip" class="text-orange-900 italic font-medium"></p>
                    </div>
                </div>
                <button onclick="closeModal()" class="w-full mt-10 py-4 bg-stone-900 text-white rounded-2xl font-bold hover:bg-orange-500 transition">标记已学会</button>
            </div>
        </div>
    </div>

    <script>
        const recipes = [
            // 川味 (Sichuan)
            { name: "麻婆豆腐", cat: "Sichuan", desc: "麻辣鲜香，川菜之魂", steps: "1. 豆腐切块烫水。\n2. 炒香肉末豆瓣酱。\n3. 下豆腐焖煮，勾三次薄芡。", tip: "最后撒上的汉源花椒粉是灵魂。", img: "https://images.unsplash.com/photo-1591814447921-7fa7a2f6d55d?q=80&w=600" },
            { name: "宫保鸡丁", cat: "Sichuan", desc: "荔枝味型，经典川菜", steps: "1. 鸡丁腌制入味。\n2. 炸香辣椒花椒。\n3. 入鸡丁花生大火快炒。", tip: "花生米出锅前放才能保持酥脆。", img: "https://images.unsplash.com/photo-1525755662778-989d0524087e?q=80&w=600" },
            { name: "回锅肉", cat: "Sichuan", desc: "川味之王，肥而不腻", steps: "1. 五花肉煮熟切片。\n2. 煸炒出猪油呈灯盏窝。\n3. 下豆瓣酱与蒜苗翻炒。", tip: "蒜苗千万别炒太老。", img: "https://images.unsplash.com/photo-1623341214825-9f4f963727da?q=80&w=600" },
            { name: "水煮牛肉", cat: "Sichuan", desc: "椒香浓烈，鲜烫滑嫩", steps: "1. 牛肉切片上浆。\n2. 煮熟蔬菜垫底。\n3. 烫熟牛肉，泼热油激发出辣椒味。", tip: "油温一定要高，听到滋啦声才对。", img: "https://images.unsplash.com/photo-1541518763669-27fef04b14ea?q=80&w=600" },
            
            // 粤式 (Cantonese)
            { name: "广式蒸鱼", cat: "Cantonese", desc: "极致鲜美，原汁原味", steps: "1. 鱼垫葱姜蒸8分钟。\n2. 倒掉盘中水。\n3. 淋豉油泼热油。", tip: "鱼眼突出来就说明蒸熟了。", img: "https://images.unsplash.com/photo-1519708227418-c8fd9a32b7a2?q=80&w=600" },
            { name: "干炒牛河", cat: "Cantonese", desc: "镬气十足，盘底无油", steps: "1. 炒香牛肉盛出。\n2. 猛火炒散河粉。\n3. 下牛肉与韭黄速拌。", tip: "油不能多，全靠火候。", img: "https://images.unsplash.com/photo-1512058564366-18510be2db19?q=80&w=600" },
            { name: "白斩鸡", cat: "Cantonese", desc: "皮爽肉滑，骨髓带红", steps: "1. 三提三放浸熟。\n2. 过冰水激皮。\n3. 配姜葱蓉蘸料。", tip: "皮黄油亮的秘密是过冰水。", img: "https://images.unsplash.com/photo-1598515214211-89d3c73ae83b?q=80&w=600" },
            { name: "菠萝咕噜肉", cat: "Cantonese", desc: "酸甜可口，色泽红亮", steps: "1. 肉块炸至酥脆。\n2. 调制糖醋汁。\n3. 入肉块菠萝挂汁。", tip: "裹粉一定要均匀。", img: "https://images.unsplash.com/photo-1525755662778-989d0524087e?q=80&w=600" },

            // 家常 (Home)
            { name: "红烧肉", cat: "Home", desc: "入口即化，经典本味", steps: "1. 五花肉炒糖色。\n2. 小火焖煮1小时。\n3. 大火收汁至粘稠。", tip: "加一点陈醋能让肉烂得更快。", img: "https://images.unsplash.com/photo-1627308595229-7830a5c91f9f?q=80&w=600" },
            { name: "番茄炒蛋", cat: "Home", desc: "国民神菜，拌饭神器", steps: "1. 鸡蛋炒散盛出。\n2. 番茄炒出浓汁。\n3. 混合并加盐糖调味。", tip: "鸡蛋里加一点点水会更蓬松。", img: "https://images.unsplash.com/photo-1582450871972-ab5ca641643d?q=80&w=600" },
            { name: "地三鲜", cat: "Home", desc: "素菜天花板，鲜咸味浓", steps: "1. 茄子土豆过油炸。\n2. 煸炒青椒。\n3. 调浓稠芡汁勾芡。", tip: "土豆一定要炸到边缘金黄。", img: "https://images.unsplash.com/photo-1512621776951-a57141f2eefd?q=80&w=600" },
            { name: "糖醋排骨", cat: "Home", desc: "骨里透香，酸甜平衡", steps: "1. 排骨煎至两面金黄。\n2. 按1:2:3:4调汁。\n3. 焖煮收汁撒芝麻。", tip: "排骨一定要先焯水去腥。", img: "https://images.unsplash.com/photo-1544148103-0773bf10d330?q=80&w=600" },
            { name: "酸辣土豆丝", cat: "Home", desc: "爽脆下饭，简单美味", steps: "1. 土豆切细丝洗去淀粉。\n2. 辣椒炝锅。\n3. 大火快炒，临出锅淋醋。", tip: "多冲洗几次，炒出来才脆。", img: "https://images.unsplash.com/photo-1585109649139-366815a0d713?q=80&w=600" },

            // 异国 (Global)
            { name: "法式牛排", cat: "Global", desc: "外焦内嫩，优雅晚餐", steps: "1. 牛排吸干水分。\n2. 猛火两面煎焦。\n3. 放黄油迷迭香静置。", tip: "醒肉是锁住汁水的秘诀。", img: "https://images.unsplash.com/photo-1546241072-48010ad28c2c?q=80&w=600" },
            { name: "冬阴功汤", cat: "Global", desc: "泰式风味，酸辣开胃", steps: "1. 煮香草底汤。\n2. 入鲜虾草菇。\n3. 挤青柠汁下椰奶。", tip: "柠檬叶一定要最后关火再放。", img: "https://images.unsplash.com/photo-1548943487-a2e4143eb544?q=80&w=600" },
            { name: "意式肉酱面", cat: "Global", desc: "经典番茄肉酱，浓郁悠长", steps: "1. 慢炒肉酱30分钟。\n2. 意面煮至弹牙。\n3. 撒大量芝士碎。", tip: "酱汁煮得越久越香。", img: "https://images.unsplash.com/photo-1551183053-bf91a1d81141?q=80&w=600" },
            { name: "韩式拌饭", cat: "Global", desc: "五彩斑斓，健康满足", steps: "1. 炒熟各式配菜。\n2. 煎一颗溏心蛋。\n3. 加韩式辣酱拌匀。", tip: "石锅刷层香油能烫出锅巴。", img: "https://images.unsplash.com/photo-1590301157890-4810ed352733?q=80&w=600" },
            { name: "墨西哥塔可", cat: "Global", desc: "浓郁风情，口感丰富", steps: "1. 煎脆玉米饼。\n2. 填入肉馅与莎莎酱。\n3. 撒大量香菜洋葱。", tip: "牛油果酱是绝对的加分项。", img: "https://images.unsplash.com/photo-1565299585323-38d6b0865b47?q=80&w=600" },
            { name: "日式拉面", cat: "Global", desc: "汤头醇厚，面条筋道", steps: "1. 熬制浓缩猪骨汤。\n2. 煮面配叉烧溏心蛋。\n3. 撒黑麻油。", tip: "面条煮的时间要精准控制。", img: "https://images.unsplash.com/photo-1526318896980-cf78c088247c?q=80&w=600" },
            { name: "海鲜天妇罗", cat: "Global", desc: "轻薄如羽，酥脆透亮", steps: "1. 调制冰水面糊。\n2. 裹薄糊下油锅。\n3. 配上特制蘸汁。", tip: "面糊不要过度搅拌。", img: "https://images.unsplash.com/photo-1615361413105-8825f7712a61?q=80&w=600" }
        ];

        const grid = document.getElementById('foodGrid');
        function render(data) {
            grid.innerHTML = data.map((r, i) => `
                <div class="food-card bg-white overflow-hidden shadow-sm border border-stone-100 hover:shadow-2xl transition-all" style="animation-delay:${i*0.05}s">
                    <div class="h-60 cursor-pointer relative group" onclick="showDetail('${r.name}', '${r.img}', '${r.steps.replace(/\n/g, "<br>")}', '${r.tip}')">
                        <img src="${r.img}" class="w-full h-full object-cover group-hover:scale-105 transition duration-700">
                        <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                            <span class="text-white font-bold border-2 border-white px-5 py-2 rounded-full backdrop-blur-sm">查看食谱</span>
                        </div>
                    </div>
                    <div class="p-8">
                        <h3 class="font-black text-2xl mb-2">${r.name}</h3>
                        <p class="text-stone-400 text-sm mb-6 tracking-wide">${r.desc}</p>
                        <button onclick="toggleFav(event)" class="w-full py-4 bg-stone-50 rounded-2xl text-stone-500 text-xs font-bold hover:text-red-500 hover:bg-red-50 transition-all flex items-center justify-center gap-2">❤ 收藏此味</button>
                    </div>
                </div>
            `).join('');
        }

        function searchFood() {
            const val = document.getElementById('searchInput').value.toLowerCase();
            render(recipes.filter(r => r.name.toLowerCase().includes(val)));
        }

        function filterFood(cat) {
            render(cat === 'all' ? recipes : recipes.filter(r => r.cat === cat));
        }

        function showDetail(n, i, s, t) {
            document.getElementById('modal-title').innerText = n;
            document.getElementById('modal-img').src = i;
            document.getElementById('modal-steps').innerHTML = s;
            document.getElementById('modal-tip').innerText = t;
            document.getElementById('modal-overlay').style.display = 'flex';
            setTimeout(() => document.getElementById('modal-content').classList.replace('scale-95', 'scale-100'), 10);
        }

        function closeModal() {
            document.getElementById('modal-content').classList.replace('scale-100', 'scale-95');
            setTimeout(() => document.getElementById('modal-overlay').style.display = 'none', 200);
        }

        function toggleFav(e) {
            e.stopPropagation();
            const b = e.currentTarget;
            b.classList.toggle('text-red-500');
            b.innerHTML = b.classList.contains('text-red-500') ? '❤️ 已收藏' : '❤ 收藏此味';
        }

        function pickRandomFood() {
            const r = recipes[Math.floor(Math.random() * recipes.length)];
            showDetail(r.name, r.img, r.steps.replace(/\n/g, "<br>"), r.tip);
        }

        render(recipes);
    </script>
</body>
</html>
