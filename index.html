<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的美食私人收藏</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { scroll-behavior: smooth; }
        .food-hero { 
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
            url('https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&w=1200&q=80'); 
            background-size: cover; background-position: center; 
        }
        .food-item { transition: all 0.3s ease; cursor: pointer; }
        /* 弹窗背景遮罩 */
        #modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; backdrop-blur: 5px; }
    </style>
</head>
<body class="bg-stone-50 text-gray-800">

    <nav class="fixed w-full bg-white/90 backdrop-blur-md shadow-sm z-50">
        <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
            <span class="text-2xl font-bold text-orange-600">🍴 美食大赏</span>
            <div class="flex space-x-4 text-gray-600 font-medium">
                <button onclick="filterFood('all')" class="hover:text-orange-500">全部</button>
                <button onclick="filterFood('cn')" class="hover:text-orange-500">中餐</button>
                <button onclick="filterFood('kr')" class="hover:text-orange-500">韩餐</button>
                <button onclick="filterFood('west')" class="hover:text-orange-500">西餐</button>
            </div>
        </div>
    </nav>

    <section class="food-hero h-[30vh] flex items-center justify-center text-white pt-16">
        <div class="text-center px-4">
            <h1 class="text-3xl md:text-5xl font-black mb-2">人间烟火气</h1>
            <p class="opacity-90">点击菜品查看详细做法</p>
        </div>
    </section>

    <section class="py-12 max-w-6xl mx-auto px-4">
        <div id="food-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
            
            <div class="food-item cn bg-white rounded-2xl overflow-hidden shadow-md hover:scale-105" 
                 onclick="showDetail('麻婆豆腐', 'https://assets.tmecosys.com/image/upload/t_web_rdp_recipe_584x480_1_5x/img/recipe/ras/Assets/0B16D5E2-C19B-4BEE-AD1B-75C63D23BE3C/Derivates/B8A0692E-CA25-439F-8F24-F1C5E74B42E1.jpg', '1. 豆腐切方块，牛肉切末。<br>2. 锅中下油，炒香豆瓣酱、姜蒜末、豆豉。<br>3. 加入高汤和豆腐烧开，小火焖煮。<br>4. 勾三次薄芡，最后撒上大量的花椒粉和青蒜末。')">
                <img src="https://assets.tmecosys.com/image/upload/t_web_rdp_recipe_584x480_1_5x/img/recipe/ras/Assets/0B16D5E2-C19B-4BEE-AD1B-75C63D23BE3C/Derivates/B8A0692E-CA25-439F-8F24-F1C5E74B42E1.jpg" class="w-full h-56 object-cover">
                <div class="p-5">
                    <span class="text-red-600 text-xs font-bold uppercase">中餐</span>
                    <h3 class="text-xl font-bold mt-1">麻婆豆腐</h3>
                    <p class="text-gray-500 text-sm mt-2 italic">查看详细做法...</p>
                </div>
            </div>

            <div class="food-item kr bg-white rounded-2xl overflow-hidden shadow-md hover:scale-105" 
                 onclick="showDetail('韩式泡菜锅', 'https://life.anyongfresh.com/wp-content/uploads/2020/10/%E9%8D%8B%E5%BA%95%E7%B3%BB%E5%88%97-%E9%9F%93%E5%BC%8F%E6%B3%A1%E8%8F%9C%E9%8D%8B-600.jpg', '1. 五花肉煸炒出油，放入洋葱、蒜片炒香。<br>2. 放入老泡菜、辣酱翻炒。<br>3. 加入淘米水、豆腐、午餐肉和金针菇。<br>4. 中火熬煮15分钟，出锅前撒葱段。')">
                <img src="https://life.anyongfresh.com/wp-content/uploads/2020/10/%E9%8D%8B%E5%BA%95%E7%B3%BB%E5%88%97-%E9%9F%93%E5%BC%8F%E6%B3%A1%E8%8F%9C%E9%8D%8B-600.jpg" class="w-full h-56 object-cover">
                <div class="p-5">
                    <span class="text-blue-600 text-xs font-bold uppercase">韩餐</span>
                    <h3 class="text-xl font-bold mt-1">韩式泡菜锅</h3>
                    <p class="text-gray-500 text-sm mt-2 italic">查看详细做法...</p>
                </div>
            </div>

            <div class="food-item west bg-white rounded-2xl overflow-hidden shadow-md hover:scale-105" 
                 onclick="showDetail('战斧牛排', 'https://images.unsplash.com/photo-1544025162-d76694265947?auto=format&fit=crop&w=500&q=80', '1. 牛排提前解冻，用吸水纸擦干水分。<br>2. 两面撒厚厚的黑胡椒和海盐。<br>3. 锅烧到冒烟，放入黄油、迷迭香和大蒜。<br>4. 每面煎3分钟左右，取出静置5分钟锁住肉汁。')">
                <img src="https://images.unsplash.com/photo-1544025162-d76694265947?auto=format&fit=crop&w=500&q=80" class="w-full h-56 object-cover">
                <div class="p-5">
                    <span class="text-amber-600 text-xs font-bold uppercase">西餐</span>
                    <h3 class="text-xl font-bold mt-1">战斧牛排</h3>
                    <p class="text-gray-500 text-sm mt-2 italic">查看详细做法...</p>
                </div>
            </div>

        </div>
    </section>

    <div id="modal-overlay" onclick="closeModal()">
        <div class="max-w-2xl mx-auto mt-20 bg-white rounded-3xl overflow-hidden shadow-2xl relative" onclick="event.stopPropagation()">
            <button class="absolute top-4 right-4 bg-black/20 hover:bg-black/50 text-white w-8 h-8 rounded-full" onclick="closeModal()">✕</button>
            <img id="modal-img" class="w-full h-64 object-cover" src="">
            <div class="p-8">
                <h2 id="modal-title" class="text-3xl font-bold text-orange-600 mb-4"></h2>
                <div class="h-px bg-orange-100 mb-6"></div>
                <h4 class="font-bold text-lg mb-2">📖 详细做法：</h4>
                <p id="modal-content" class="text-gray-600 leading-relaxed space-y-4"></p>
            </div>
        </div>
    </div>

    <script>
        // 筛选功能
        function filterFood(category) {
            const items = document.querySelectorAll('.food-item');
            items.forEach(item => {
                if (category === 'all' || item.classList.contains(category)) {
                    item.style.display = 'block';
                } else {
                    item.style.display = 'none';
                }
            });
        }

        // 弹窗功能
        function showDetail(title, imgSrc, steps) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-img').src = imgSrc;
            document.getElementById('modal-content').innerHTML = steps;
            document.getElementById('modal-overlay').style.display = 'block';
            document.body.style.overflow = 'hidden'; // 禁止背景滚动
        }

        function closeModal() {
            document.getElementById('modal-overlay').style.display = 'none';
            document.body.style.overflow = 'auto'; // 恢复滚动
        }
    </script>
</body>
</html>
<div class="food-item cn bg-white rounded-2xl overflow-hidden shadow-md hover:scale-105"

                    <span class="text-red-600 text-xs font-bold uppercase">中餐</span>

            <div class="food-item kr bg-white rounded-2xl overflow-hidden shadow-md hover:scale-105" 
                 onclick="showDetail('韩式炸鸡', 'https://images.unsplash.com/photo-1626082927389-6cd097cdc6ec?auto=format&fit=crop&w=800&q=80', '1. 鸡块用牛奶、盐、黑胡椒腌制半小时。<br>2. 裹上炸鸡粉，下油锅复炸两次保证酥脆。<br>3. 锅中调入韩式辣酱、蜂蜜、蒜泥煮至浓稠。<br>4. 放入鸡块快速翻拌，撒上白芝麻。')">
                <img src="https://images.unsplash.com/photo-1626082927389-6cd097cdc6ec?auto=format&fit=crop&w=800&q=80" class="w-full h-56 object-cover">

            <div class="food-item west bg-white rounded-2xl overflow-hidden shadow-md hover:scale-105"

                <img src="https://images.unsplash.com/photo-1571877227200-a0d98ea607e9?auto=format&fit=crop&w=800&q=80" class="w-full h-56 object-cover">
                <div class
