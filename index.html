<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的美食私人收藏 2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { scroll-behavior: smooth; }
        .food-hero { 
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
            url('https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&w=1200&q=80'); 
            background-size: cover; background-position: center; 
        }
        .food-item { transition: all 0.3s ease; cursor: pointer; }
        /* 弹窗背景遮罩 */
        #modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 100; backdrop-filter: blur(8px); }
        .star-rating { color: #fbbf24; }
    </style>
</head>
<body class="bg-stone-50 text-gray-800">

    <nav class="fixed w-full bg-white/90 backdrop-blur-md shadow-sm z-50">
        <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
            <span class="text-2xl font-bold text-orange-600">🍴 美食大赏</span>
            <div class="flex space-x-4 text-gray-600 font-medium text-sm md:text-base">
                <button onclick="filterFood('all')" class="hover:text-orange-500 transition">全部</button>
                <button onclick="filterFood('cn')" class="hover:text-orange-500 transition">中餐</button>
                <button onclick="filterFood('kr')" class="hover:text-orange-500 transition">韩餐</button>
                <button onclick="filterFood('west')" class="hover:text-orange-500 transition">西餐</button>
            </div>
        </div>
    </nav>

    <section class="pt-24 pb-6 px-4 max-w-6xl mx-auto">
        <div class="relative">
            <input type="text" id="searchInput" onkeyup="searchFood()" placeholder="🔍 搜索美食名称..." 
                class="w-full p-4 rounded-2xl border-2 border-orange-100 focus:border-orange-500 focus:outline-none shadow-sm text-lg">
        </div>
    </section>

    <section class="pb-12 max-w-6xl mx-auto px-4">
        <div id="food-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
            
            <div class="food-item cn bg-white rounded-3xl overflow-hidden shadow-md hover:scale-105" 
                 onclick="showDetail('麻婆豆腐', 'https://assets.tmecosys.com/image/upload/t_web_rdp_recipe_584x480_1_5x/img/recipe/ras/Assets/0B16D5E2-C19B-4BEE-AD1B-75C63D23BE3C/Derivates/B8A0692E-CA25-439F-8F24-F1C5E74B42E1.jpg', '1. 豆腐切方块，牛肉切末。<br>2. 锅中下油，炒香豆瓣酱、姜蒜末、豆豉。<br>3. 加入高汤和豆腐烧开，小火焖煮。<br>4. 勾三次薄芡，最后撒上大量的花椒粉。')">
                <img src="https://assets.tmecosys.com/image/upload/t_web_rdp_recipe_584x480_1_5x/img/recipe/ras/Assets/0B16D5E2-C19B-4BEE-AD1B-75C63D23BE3C/Derivates/B8A0692E-CA25-439F-8F24-F1C5E74B42E1.jpg" class="w-full h-56 object-cover">
                <div class="p-5">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-red-600 text-xs font-bold uppercase px-2 py-1 bg-red-50 rounded">中餐</span>
                        <div class="star-rating text-sm">⭐⭐⭐⭐⭐</div>
                    </div>
                    <h3 class="food-name text-xl font-bold">麻婆豆腐</h3>
                    <p class="text-gray-400 text-xs mt-2">点击查看详细做法</p>
                </div>
            </div>

            <div class="food-item cn bg-white rounded-3xl overflow-hidden shadow-md hover:scale-105" 
                 onclick="showDetail('北京烤鸭', 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT6d8NcqTQaDr-jUCPvx4dIjrOqWsl17BZywg&s', '1. 鸭子洗净烫皮，全身涂抹糖脆皮水，风干8小时。<br>2. 烤箱180°C烤制45-60分钟。<br>3. 片皮，搭配荷叶饼、甜面酱、葱丝和黄瓜条。')">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT6d8NcqTQaDr-jUCPvx4dIjrOqWsl17BZywg&s" class="w-full h-56 object-cover">
                <div class="p-5">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-red-600 text-xs font-bold uppercase px-2 py-1 bg-red-50 rounded">中餐</span>
                        <div class="star-rating text-sm">⭐⭐⭐⭐⭐</div>
                    </div>
                    <h3 class="food-name text-xl font-bold">北京烤鸭</h3>
                    <p class="text-gray-400 text-xs mt-2">点击查看详细做法</p>
                </div>
            </div>

            <div class="food-item kr bg-white rounded-3xl overflow-hidden shadow-md hover:scale-105" 
                 onclick="showDetail('石锅拌饭', 'https://images.unsplash.com/photo-1590301157890-4810ed352733?auto=format&fit=crop&w=800&q=80', '1. 各种蔬菜分别焯水炒熟。<br>2. 石锅刷层香油，铺上米饭，将蔬菜摆在上面。<br>3. 加热至锅底有锅巴声，淋上辣酱。')">
                <img src="https://images.unsplash.com/photo-1590301157890-4810ed352733?auto=format&fit=crop&w=800&q=80" class="w-full h-56 object-cover">
                <div class="p-5">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-blue-600 text-xs font-bold uppercase px-2 py-1 bg-blue-50 rounded">韩餐</span>
                        <div class="star-rating text-sm">⭐⭐⭐⭐</div>
                    </div>
                    <h3 class="food-name text-xl font-bold">石锅拌饭</h3>
                    <p class="text-gray-400 text-xs mt-2">点击查看详细做法</p>
                </div>
            </div>

            <div class="food-item kr bg-white rounded-3xl overflow-hidden shadow-md hover:scale-105" 
                 onclick="showDetail('韩式炸鸡', 'https://images.unsplash.com/photo-1626082927389-6cd097cdc6ec?auto=format&fit=crop&w=800&q=80', '1. 鸡块腌制半小时。<br>2. 裹粉下油锅复炸两次保证酥脆。<br>3. 快速翻拌酱汁，撒上白芝麻。')">
                <img src="https://images.unsplash.com/photo-1626082927389-6cd097cdc6ec?auto=format&fit=crop&w=800&q=80" class="w-full h-56 object-cover">
                <div class="p-5">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-blue-600 text-xs font-bold uppercase px-2 py-1 bg-blue-50 rounded">韩餐</span>
                        <div class="star-rating text-sm">⭐⭐⭐⭐⭐</div>
                    </div>
                    <h3 class="food-name text-xl font-bold">韩式炸鸡</h3>
                    <p class="text-gray-400 text-xs mt-2">点击查看详细做法</p>
                </div>
            </div>

            <div class="food-item kr bg-white rounded-3xl overflow-hidden shadow-md hover:scale-105" 
                 onclick="showDetail('韩式泡菜锅', 'https://life.anyongfresh.com/wp-content/uploads/2020/10/%E9%8D%8B%E5%BA%95%E7%B3%BB%E5%88%97-%E9%9F%93%E5%BC%8F%E6%B3%A1%E8%8F%9C%E9%8D%8B-600.jpg', '1. 五花肉煸炒，放入泡菜、辣酱翻炒。<br>2. 加入淘米水、豆腐、午餐肉和金针菇。')">
                <img src="https://life.anyongfresh.com/wp-content/uploads/2020/10/%E9%8D%8B%E5%BA%95%E7%B3%BB%E5%88%97-%E9%9F%93%E5%BC%8F%E6%B3%A1%E8%8F%9C%E9%8D%8B-600.jpg" class="w-full h-56 object-cover">
                <div class="p-5">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-blue-600 text-xs font-bold uppercase px-2 py-1 bg-blue-50 rounded">韩餐</span>
                        <div class="star-rating text-sm">⭐⭐⭐⭐</div>
                    </div>
                    <h3 class="food-name text-xl font-bold">韩式泡菜锅</h3>
                    <p class="text-gray-400 text-xs mt-2">点击查看详细做法</p>
                </div>
            </div>

            <div class="food-item west bg-white rounded-3xl overflow-hidden shadow-md hover:scale-105" 
                 onclick="showDetail('提拉米苏', 'https://images.unsplash.com/photo-1571877227200-a0d98ea607e9?auto=format&fit=crop&w=800&q=80', '1. 混合马斯卡彭干酪。<br>2. 饼干浸入咖啡液，冷藏4小时以上。')">
                <img src="https://images.unsplash.com/photo-1571877227200-a0d98ea607e9?auto=format&fit=crop&w=800&q=80" class="w-full h-56 object-cover">
                <div class="p-5">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-amber-600 text-xs font-bold uppercase px-2 py-1 bg-amber-50 rounded">西餐</span>
                        <div class="star-rating text-sm">⭐⭐⭐⭐⭐</div>
                    </div>
                    <h3 class="food-name text-xl font-bold">提拉米苏</h3>
                    <p class="text-gray-400 text-xs mt-2">点击查看详细做法</p>
                </div>
            </div>

            <div class="food-item west bg-white rounded-3xl overflow-hidden shadow-md hover:scale-105" 
                 onclick="showDetail('战斧牛排', 'https://images.unsplash.com/photo-1544025162-d76694265947?auto=format&fit=crop&w=500&q=80', '1. 撒厚厚的黑胡椒和海盐。<br>2. 锅烧到冒烟，放入黄油、迷迭香和大蒜淋洗。')">
                <img src="https://images.unsplash.com/photo-1544025162-d76694265947?auto=format&fit=crop&w=500&q=80" class="w-full h-56 object-cover">
                <div class="p-5">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-amber-600 text-xs font-bold uppercase px-2 py-1 bg-amber-50 rounded">西餐</span>
                        <div class="star-rating text-sm">⭐⭐⭐⭐⭐</div>
                    </div>
                    <h3 class="food-name text-xl font-bold">战斧牛排</h3>
                    <p class="text-gray-400 text-xs mt-2">点击查看详细做法</p>
                </div>
            </div>

        </div>
    </section>

    <div id="modal-overlay" onclick="closeModal()">
        <div class="max-w-2xl mx-auto mt-20 bg-white rounded-[2rem] overflow-hidden shadow-2xl relative" onclick="event.stopPropagation()">
            <button class="absolute top-4 right-4 bg-black/20 hover:bg-black/50 text-white w-10 h-10 rounded-full flex items-center justify-center" onclick="closeModal()">✕</button>
            <img id="modal-img" class="w-full h-72 object-cover" src="">
            <div class="p-8">
                <h2 id="modal-title" class="text-3xl font-bold text-orange-600 mb-2"></h2>
                <div class="h-1 w-20 bg-orange-500 rounded mb-6"></div>
                <h4 class="font-bold text-lg mb-2">👨‍🍳 详细做法：</h4>
                <p id="modal-content" class="text-gray-600 leading-relaxed space-y-4"></p>
            </div>
        </div>
    </div>

    <script>
        // 搜索功能
        function searchFood() {
            let input = document.getElementById('searchInput').value.toLowerCase();
            let items = document.querySelectorAll('.food-item');
            items.forEach(item => {
                let name = item.querySelector('.food-name').innerText.toLowerCase();
                item.style.display = name.includes(input) ? "block" : "none";
            });
        }

        // 筛选功能
        function filterFood(category) {
            const items = document.querySelectorAll('.food-item');
            items.forEach(item => {
                item.style.display = (category === 'all' || item.classList.contains(category)) ? "block" : "none";
            });
        }

        // 弹窗功能
        function showDetail(title, imgSrc, steps) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-img').src = imgSrc;
            document.getElementById('modal-content').innerHTML = steps;
            document.getElementById('modal-overlay').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modal-overlay').style.display = 'none';
            document.body.style.overflow = 'auto';
        }
    </script>
</body>
</html>
