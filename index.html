<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YHC GOURMET | 私人美食收藏馆</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .food-card { animation: fadeInUp 0.6s ease forwards; opacity: 0; border-radius: 2.5rem !important; }
        #modal-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(12px); display: none; z-index: 100; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        html { scroll-behavior: smooth; }
        .hero-gradient { background: linear-gradient(to bottom, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.8) 100%); }
        .step-done { opacity: 0.3; text-decoration: line-through; }
    </style>
</head>
<body class="bg-stone-50 text-stone-800 flex flex-col min-h-screen">

    <nav class="fixed top-0 w-full z-50 bg-white/90 backdrop-blur-md border-b border-stone-100">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between gap-4">
            <div class="flex items-center gap-2 shrink-0">
                <div class="w-8 h-8 bg-orange-600 rounded-lg flex items-center justify-center rotate-3 shadow-lg">
                    <span class="text-white text-xl font-bold">Y</span>
                </div>
                <h1 class="text-xl font-black text-stone-700 tracking-tight">HC GOURMET</h1>
            </div>
            <div class="flex-grow max-w-md hidden md:block">
                <div class="flex items-center bg-stone-100 rounded-full px-5 py-2 border border-stone-200">
                    <input type="text" id="searchInput" onkeyup="searchFood()" placeholder="搜寻食谱..." class="bg-transparent border-none outline-none w-full text-sm text-stone-600">
                </div>
            </div>
            <button onclick="pickRandomFood()" class="px-5 py-2 bg-orange-200/60 text-orange-700 rounded-full text-sm font-bold shadow-sm hover:scale-105 transition flex items-center gap-1">🎲 帮我决定</button>
        </div>
    </nav>

    <section class="relative h-[45vh] w-full flex items-center justify-center text-center overflow-hidden">
        <img src="https://images.unsplash.com/photo-1555939594-58d7cb561ad1?q=80&w=2000" class="absolute inset-0 w-full h-full object-cover">
        <div class="absolute inset-0 hero-gradient"></div>
        <div class="relative z-10 px-6 pt-16">
            <h2 class="text-5xl md:text-6xl font-black text-white mb-2 tracking-tight">今日 <span class="text-orange-500 italic">清单</span></h2>
            <p class="text-white/80 text-sm tracking-widest font-light">精心收录的私人视听美食馆</p>
        </div>
    </section>

    <main id="menu-start" class="max-w-7xl mx-auto px-6 pt-12 pb-20 flex-grow w-full">
        <header class="mb-12 flex justify-center md:justify-start">
            <div class="flex flex-wrap gap-3" id="filterGroup">
                <button onclick="filterFood('all')" class="px-6 py-2 bg-stone-900 text-white rounded-full text-sm font-bold shadow-md">全部</button>
                <button onclick="filterFood('川味')" class="px-6 py-2 bg-white border border-stone-200 rounded-full text-sm font-bold hover:bg-stone-50 transition">川味</button>
                <button onclick="filterFood('粤式')" class="px-6 py-2 bg-white border border-stone-200 rounded-full text-sm font-bold hover:bg-stone-50 transition">粤式</button>
                <button onclick="filterFood('家常')" class="px-6 py-2 bg-white border border-stone-200 rounded-full text-sm font-bold hover:bg-stone-50 transition">家常</button>
                <button onclick="filterFood('异国')" class="px-6 py-2 bg-white border border-stone-200 rounded-full text-sm font-bold hover:bg-stone-50 transition">异国</button>
            </div>
        </header>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-10" id="foodGrid"></div>
    </main>

    <div id="modal-overlay" onclick="closeModal()" class="flex items-center justify-center p-4">
        <div id="modal-content" class="bg-white rounded-[3.5rem] max-w-5xl w-full max-h-[92vh] overflow-hidden flex flex-col md:flex-row shadow-2xl transition-all scale-95" onclick="event.stopPropagation()">
            <div class="md:w-3/5 overflow-y-auto no-scrollbar p-10 lg:p-14 border-r border-stone-100">
                
                <div class="relative h-72 rounded-[2.5rem] overflow-hidden mb-6 shadow-lg bg-stone-900 flex items-center justify-center">
                    <img id="modal-img" src="" class="w-full h-full object-cover">
                    
                    <video id="modal-video" src="" controls playsinline preload="auto" class="absolute inset-0 w-full h-full hidden bg-black object-contain"></video>
                    
                    <div class="absolute bottom-4 right-4 flex gap-2 z-10">
                        <button id="btn-show-img" onclick="switchMedia('img')" class="px-4 py-1.5 bg-white/90 backdrop-blur text-stone-800 text-xs font-bold rounded-full shadow hidden">🖼️ 看封面图</button>
                        <button id="btn-show-video" onclick="switchMedia('video')" class="px-4 py-1.5 bg-orange-600 text-white text-xs font-bold rounded-full shadow hover:bg-orange-700 transition">▶️ 播放教学视频</button>
                    </div>
                </div>

                <h2 id="modal-title" class="text-4xl font-black mb-4"></h2>
                <div id="modal-tags" class="flex flex-wrap gap-2 mb-8"></div>
                <div class="w-20 h-1.5 bg-orange-500 mb-10 rounded-full"></div>
                <p class="text-stone-400 text-xs font-bold mb-4 uppercase tracking-widest">Cooking Steps (点击步骤标记完成)</p>
                <div id="modal-steps" class="space-y-6 mb-10"></div>
                
                <div class="p-8 bg-orange-50 border-l-8 border-orange-500 rounded-r-3xl">
                    <p class="text-orange-950 font-black mb-2 flex items-center gap-2"><span>💡</span> 灵魂贴士</p>
                    <p id="modal-tip" class="text-orange-900 leading-relaxed italic text-sm"></p>
                </div>
            </div>

            <div class="md:w-2/5 bg-stone-50 flex flex-col h-full">
                <div class="p-8 border-b border-stone-200 bg-white flex justify-between items-center">
                    <h4 class="text-xl font-black">味道点评</h4>
                    <span id="comment-count" class="bg-orange-100 text-orange-600 px-3 py-1 rounded-full text-xs font-bold">0</span>
                </div>
                <div id="comment-list" class="flex-grow overflow-y-auto p-8 space-y-6 no-scrollbar"></div>
                <div class="p-8 bg-white border-t border-stone-200">
                    <textarea id="commentInput" placeholder="分享你的烹饪心得..." class="w-full bg-stone-100 border-none rounded-2xl p-4 text-sm focus:ring-2 focus:ring-orange-500 outline-none h-24 resize-none mb-4 transition-all"></textarea>
                    <button onclick="addComment()" class="w-full py-4 bg-stone-900 text-white rounded-2xl font-bold hover:bg-orange-600 transition shadow-lg">提交评论</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 内置一个绝对不会加载失败的轻量级测试动态视频流数据
        const safeBackupVideo = "https://www.w3schools.com/html/mov_bbb.mp4";

        // 数据完全对齐您截图上的新分类和排版
        const recipes = [
            { 
                name: "麻婆豆腐", cat: "川味", spicy: "🌶️🌶️🌶️🌶️ 4/5", diff: "初学级", time: "15min", 
                video: "video/ma_po.mp4", // 本地视频路径
                steps: ["【切块】豆腐切成2厘米方块，入加盐的沸水中焯水去除豆腥。","【煸肉】热锅凉油，下牛肉末煸炒至酥香焦黄。","【下酱】下郫县豆瓣酱、豆豉、辣椒面炒出红油。","【慢笃】加高汤和豆腐，小火慢笃入味，分三次勾芡收汁。","【撒椒】出锅后撒上满满一层汉源花椒面和青蒜苗。"],
                tip: "豆腐焯水时加盐，能让豆腐质地更紧结，炒的时候不易碎。", img: "https://images.unsplash.com/photo-1541832676-9b763b0239ab?q=80&w=800",
                comments: [{user: "成都好吃嘴", content: "麻味很正，太下饭了！", time: "3小时前"}]
            },
            { 
                name: "广式蒸鱼", cat: "粤式", spicy: "🌶️ 0/5", diff: "进阶级", time: "20min", 
                video: safeBackupVideo, // 使用安全备份源测试
                steps: ["【改刀】鲜鱼洗净，在鱼身两面各划几刀，垫上葱段和姜片。","【猛火】蒸锅水烧大开，放入鱼盘，大火猛攻7-8分钟。","【去水】倒掉盘子里的蒸鱼水（这一步是去腥关键！），拣去老葱姜。","【铺丝】铺上切好的极细葱丝、姜丝、红椒丝。","【泼油】烧热油激发出葱香，最后沿盘子边缘淋入蒸鱼豉油。"],
                tip: "蒸鱼的水一定要倒掉，那是腥味的来源。豉油要热油之后倒，不要直接淋在鱼肉上。", img: "https://images.unsplash.com/photo-1519708227418-c8fd9a32b7a2?q=80&w=800",
                comments: [{user: "老广阿明", content: "原汁原味，鱼肉非常滑嫩！", time: "5小时前"}]
            },
            { 
                name: "法式牛排", cat: "异国", spicy: "🌶️ 0/5", diff: "进阶级", time: "15min", 
                video: "video/steak.mp4",
                steps: ["【回温】牛排提前从冰箱取出，恢复至室温，用厨房纸吸干表面水分。","【调味】双面撒上现磨黑胡椒和海盐，涂抹少许橄榄油。","【煎制】铸铁锅烧到冒烟，下牛排，每面大火煎炸1-2分钟锁住肉汁。","【黄油】调小火，放入黄油、大蒜、迷迭香，用勺子不停将融化的黄油浇在牛排上。","【静置】出锅后在温热的地方静置5分钟再切开。"],
                tip: "煎完一定要静置（Resting）！这样能让肉汁回流，切的时候不会流失满盘子。", img: "https://images.unsplash.com/photo-1544025162-d76694265947?q=80&w=800",
                comments: []
            },
            { 
                name: "红烧肉", cat: "家常", spicy: "🌶️ 1/5", diff: "耐心级", time: "60min", 
                video: "video/hong_shao.mp4",
                steps: ["【改刀】五花肉切成3厘米见方的块，冷水下锅焯水捞出沥干。","【炒糖】锅中放少许油和冰糖，小火熬出红褐色的糖色。","【上色】倒入肉块快速翻炒上色，炒出多余的猪油。","【慢炖】加黄酒、生抽、老抽、八角、香叶和没过肉的开水，小火慢炖45分钟。","【收汁】最后转大火，将汤汁收至浓稠挂上红亮外衣。"],
                tip: "炖肉必须加开水！加冷水会让热肉纤维骤然紧缩，导致肉质变柴。", img: "https://images.unsplash.com/photo-1604908176997-125f25cc6f3d?q=80&w=800",
                comments: [{user: "外婆的味道", content: "肥而不腻，这个糖色熬得很漂亮。", time: "1天前"}]
            }
        ];

        let currentIndex = null;

        function render(data) {
            document.getElementById('foodGrid').innerHTML = data.map((r, i) => `
                <div class="food-card bg-white overflow-hidden shadow-sm border border-stone-100 hover:shadow-2xl transition-all" style="animation-delay:${i*0.05}s">
                    <div class="h-64 cursor-pointer relative group" onclick="showDetail(${recipes.indexOf(r)})">
                        <img src="${r.img}" class="w-full h-full object-cover group-hover:scale-105 transition duration-700">
                        <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                            <span class="text-white font-bold border-2 border-white px-6 py-2 rounded-full backdrop-blur-md">查看深度秘籍</span>
                        </div>
                        <div class="absolute top-4 right-4 bg-orange-600 text-white px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest shadow-lg">${r.cat}</div>
                    </div>
                    <div class="p-10">
                        <div class="flex items-center gap-2 mb-3">
                            <span class="text-xs font-bold text-red-600 bg-red-50 px-2 py-0.5 rounded">${r.spicy}</span>
                        </div>
                        <h3 class="font-black text-2xl mb-2">${r.name}</h3>
                        <p class="text-stone-400 text-sm mb-6 line-clamp-1 italic">💬 ${r.comments.length} 评价 · ${r.diff}</p>
                        <button onclick="toggleFav(event)" class="w-full py-4 bg-stone-50 rounded-2xl text-stone-500 text-xs font-bold hover:text-red-500 transition-all">❤ 收藏此味</button>
                    </div>
                </div>
            `).join('');
        }

        function showDetail(index) {
            currentIndex = index;
            const r = recipes[index];
            document.getElementById('modal-title').innerText = r.name;
            document.getElementById('modal-img').src = r.img;
            
            switchMedia('img');
            document.getElementById('modal-video').src = r.video;

            document.getElementById('modal-tags').innerHTML = `
                <span class="bg-red-50 text-red-600 px-4 py-1.5 rounded-xl text-xs font-bold">偏好：${r.spicy}</span>
                <span class="bg-blue-50 text-blue-600 px-4 py-1.5 rounded-xl text-xs font-bold">难度：${r.diff}</span>
                <span class="bg-stone-100 text-stone-600 px-4 py-1.5 rounded-xl text-xs font-bold">时间：${r.time}</span>
            `;

            document.getElementById('modal-tip').innerText = r.tip;
            
            document.getElementById('modal-steps').innerHTML = r.steps.map((s, i) => `
                <div class="flex gap-5 cursor-pointer hover:bg-stone-50 p-2 rounded-2xl transition group" onclick="this.classList.toggle('step-done')">
                    <span class="w-8 h-8 shrink-0 bg-stone-900 text-white rounded-xl flex items-center justify-center text-sm font-black shadow-lg group-hover:bg-orange-600">${i+1}</span>
                    <p class="text-stone-700 font-medium pt-1">${s}</p>
                </div>
            `).join('');
            
            updateComments();
            document.getElementById('modal-overlay').style.display = 'flex';
            setTimeout(() => document.getElementById('modal-content').classList.replace('scale-95', 'scale-100'), 10);
        }

        function switchMedia(type) {
            const img = document.getElementById('modal-img');
            const video = document.getElementById('modal-video');
            const btnImg = document.getElementById('btn-show-img');
            const btnVideo = document.getElementById('btn-show-video');

            if(type === 'video') {
                img.classList.add('hidden');
                video.classList.remove('hidden');
                btnVideo.classList.add('hidden');
                btnImg.classList.remove('hidden');
                
                // 引导触发播放
                video.play().catch(err => {
                    console.log("由于浏览器安全限制，请手动点击左下角的播放键进行观看。");
                });
            } else {
                video.pause();
                video.classList.add('hidden');
                img.classList.remove('hidden');
                btnImg.classList.add('hidden');
                btnVideo.classList.remove('hidden');
            }
        }

        function updateComments() {
            const r = recipes[currentIndex];
            document.getElementById('comment-count').innerText = r.comments.length;
            document.getElementById('comment-list').innerHTML = r.comments.map(c => `
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-stone-100">
                    <div class="flex justify-between mb-2"><span class="text-xs font-black text-stone-800">${c.user}</span><span class="text-[10px] text-stone-400">${c.time}</span></div>
                    <p class="text-sm text-stone-600 leading-relaxed mb-4">${c.content}</p>
                </div>
            `).join('');
        }

        function addComment() {
            const input = document.getElementById('commentInput');
            if(!input.value.trim()) return;
            recipes[currentIndex].comments.unshift({user: "美食鉴赏家", content: input.value, time: "刚刚"});
            input.value = '';
            updateComments();
            render(recipes);
        }

        function closeModal() {
            document.getElementById('modal-video').pause();
            document.getElementById('modal-content').classList.replace('scale-100', 'scale-95');
            setTimeout(() => document.getElementById('modal-overlay').style.display = 'none', 200);
        }

        function searchFood() { render(recipes.filter(r => r.name.includes(document.getElementById('searchInput').value))); }
        function filterFood(cat) { render(cat === 'all' ? recipes : recipes.filter(r => r.cat === cat)); }
        function pickRandomFood() { showDetail(Math.floor(Math.random() * recipes.length)); }
        function toggleFav(e) { e.stopPropagation(); e.currentTarget.classList.toggle('text-red-500'); }

        render(recipes);
    </script>
</body>
</html>
